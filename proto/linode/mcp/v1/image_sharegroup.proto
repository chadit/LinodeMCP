syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// ImageShareGroup mirrors one image share group. description, updated, and expiry
// are nullable (omitted when unset).
message ImageShareGroup {
  int32 id = 1;
  string uuid = 2;
  string label = 3;
  optional string description = 4;
  bool is_suspended = 5;
  string created = 6;
  optional string updated = 7;
  optional string expiry = 8;
  int32 images_count = 9;
  int32 members_count = 10;
}

// ImageShareGroupWriteResponse is the {message, sharegroup} envelope the share
// group create/update and member-add tools return.
message ImageShareGroupWriteResponse {
  string message = 1;
  ImageShareGroup sharegroup = 2;
}

// ImageShareGroupDeleteResponse is the confirmation envelope
// linode_image_sharegroup_delete returns. The delete endpoint returns an empty
// body and the handler emits only a human-readable message.
message ImageShareGroupDeleteResponse {
  string message = 1;
}

// ImageShareGroupImageDeleteResponse is the confirmation envelope
// linode_image_sharegroup_image_delete returns when a shared image is removed
// from a share group. The endpoint returns an empty body; only a message is
// emitted.
message ImageShareGroupImageDeleteResponse {
  string message = 1;
}

// ImageShareGroupListResponse is the linode_image_sharegroup_list envelope:
// count, an optional filter echo, and the share group elements.
message ImageShareGroupListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ImageShareGroup image_sharegroups = 3;
}

// ImageShareGroupGetInput is the input contract for linode_image_sharegroup_get.
message ImageShareGroupGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The image share group ID (required).
  int32 sharegroup_id = 2;
}

// ImageShareGroupByTokenGetInput is the input contract for
// linode_image_sharegroup_by_token_get.
message ImageShareGroupByTokenGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The image share group token UUID (required).
  string token_uuid = 2;
}

// ImageShareGroupListInput is the input contract for
// linode_image_sharegroup_list.
message ImageShareGroupListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ImageShareGroupByImageListInput is the input contract for
// linode_image_sharegroup_by_image_list.
message ImageShareGroupByImageListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Private image ID, for example private/12345.
  string image_id = 2;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 3;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 4;
}

// ImageShareGroupUpdateInput is the input contract for
// linode_image_sharegroup_update. sharegroup_id and confirm are required.
message ImageShareGroupUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric image share group ID to update.
  int32 sharegroup_id = 2;
  // New descriptive name for the share group (optional).
  optional string label = 3;
  // New detailed description for the share group (optional).
  optional string description = 4;
  // Must be set to true to confirm the share group update. Ignored when
  // dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// ImageShareGroupDeleteInput is the input contract for
// linode_image_sharegroup_delete, a two-stage destroy.
message ImageShareGroupDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric ID of the image share group to delete.
  int32 sharegroup_id = 2;
  // Must be set to true to confirm deletion. This action is irreversible.
  // Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// ImageShareGroupImageListInput is the input contract for
// linode_image_sharegroup_image_list.
message ImageShareGroupImageListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Image share group ID.
  int32 sharegroup_id = 2;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 3;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 4;
}

// ImageShareGroupImageUpdateInput is the input contract for
// linode_image_sharegroup_image_update. sharegroup_id, image_id, and confirm
// are required. image_id here is the shared image slug (a string).
message ImageShareGroupImageUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric image share group ID that contains the shared image.
  int32 sharegroup_id = 2;
  // The shared image ID, for example shared/1.
  string image_id = 3;
  // New descriptive name for the shared image (optional).
  optional string label = 4;
  // New detailed description for the shared image (optional).
  optional string description = 5;
  // Must be set to true to confirm the shared image update. Ignored when
  // dry_run=true.
  bool confirm = 6;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 7;
}

// ImageShareGroupImageDeleteInput is the input contract for
// linode_image_sharegroup_image_delete. Unlike the group delete, this is a
// plain confirm destroy (no mode/plan_id in the ground truth). image_id here
// is the NUMERIC shared image ID, not the slug.
message ImageShareGroupImageDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric image share group ID.
  int32 sharegroup_id = 2;
  // The numeric shared image ID to remove from the group.
  int32 image_id = 3;
  // Must be set to true to confirm removing the shared image. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// ImageShareGroupImageSpec is one entry in the images array of
// linode_image_sharegroup_create and linode_image_sharegroup_image_add: a
// private image id plus optional label/description overrides. A named item
// message preserves the item shape that a bare repeated container would lose.
message ImageShareGroupImageSpec {
  // The private image ID to share (required), for example private/12345.
  string id = 1;
  // Optional descriptive label for the shared image.
  optional string label = 2;
  // Optional detailed description for the shared image.
  optional string description = 3;
}

// ImageShareGroupCreateInput is the input contract for
// linode_image_sharegroup_create. label and confirm are required; images is an
// optional array of image specs.
message ImageShareGroupCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The share group's descriptive name.
  string label = 2;
  // Detailed description for the share group (optional).
  optional string description = 3;
  // Images to include in the share group, each an id with optional
  // label/description.
  repeated ImageShareGroupImageSpec images = 4;
  // Must be set to true to confirm image share group creation. Ignored when
  // dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// ImageShareGroupImageAddInput is the input contract for
// linode_image_sharegroup_image_add. sharegroup_id and confirm are required.
// images is required at runtime, but a repeated field cannot be marked required
// in the generated schema, so the required flag is dropped (the handler still
// enforces a non-empty images array).
message ImageShareGroupImageAddInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric image share group ID to add images to.
  int32 sharegroup_id = 2;
  // Images to add to the share group, each an id with optional
  // label/description. Required at runtime.
  repeated ImageShareGroupImageSpec images = 3;
  // Must be set to true to confirm adding images to the share group. Ignored
  // when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}
