syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// ConfigInterfacePurpose is the legacy config-profile network interface purpose.
// Values are the exact lowercase Linode API strings, authored from the live
// OpenAPI spec. See the enum-wrapper convention in nodebalancer_config.proto.
message ConfigInterfacePurpose {
  enum Value {
    unspecified = 0;
    public = 1;
    vlan = 2;
    vpc = 3;
  }
}

// ConfigRunLevel is the boot run level of a config profile. Values are the exact
// lowercase Linode API strings, authored from the live OpenAPI spec (POST/PUT
// /linode/instances/{linodeId}/configs). See the enum-wrapper convention in
// nodebalancer_config.proto.
message ConfigRunLevel {
  enum Value {
    unspecified = 0;
    default = 1;
    single = 2;
    binbash = 3;
  }
}

// ConfigVirtMode is the virtualization mode of a config profile. Values are the
// exact lowercase Linode API strings, authored from the live OpenAPI spec
// (POST/PUT /linode/instances/{linodeId}/configs).
message ConfigVirtMode {
  enum Value {
    unspecified = 0;
    paravirt = 1;
    fullvirt = 2;
  }
}

// Instance mirrors the Linode instance object returned by
// GET /linode/instances/{linodeId}. Field order and JSON names match the
// shape both implementations emit today, so the generated protojson output is
// byte-compatible with the existing tool response.
message Instance {
  int32 id = 1;
  string label = 2;
  string status = 3;
  string type = 4;
  string region = 5;
  string image = 6;
  repeated string ipv4 = 7;
  string ipv6 = 8;
  string hypervisor = 9;
  Specs specs = 10;
  Alerts alerts = 11;
  Backups backups = 12;
  string created = 13;
  string updated = 14;
  string group = 15;
  repeated string tags = 16;
  bool watchdog_enabled = 17;
  // omitempty today: dropped when empty.
  optional string interface_generation = 18;
  repeated InstanceInterface interfaces = 19;
}

message Specs {
  int32 disk = 1;
  int32 memory = 2;
  int32 vcpus = 3;
  int32 gpus = 4;
  int32 transfer = 5;
}

message Alerts {
  int32 cpu = 1;
  int32 network_in = 2;
  int32 network_out = 3;
  int32 transfer_quota = 4;
  int32 io = 5;
}

message Backups {
  Schedule schedule = 1;
  // Today the Go tag has no omitempty, so this serializes as null when absent.
  // protojson omits unpopulated message fields by default; the serialization
  // decision for this field is tracked in the proto-contract spec.
  Backup last_successful = 2;
  bool enabled = 3;
  bool available = 4;
}

message Schedule {
  string day = 1;
  string window = 2;
}

message Backup {
  int32 id = 1;
  string label = 2;
  string status = 3;
  string type = 4;
  string region = 5;
  string created = 6;
  string updated = 7;
  string finished = 8;
}

// InstanceInterface is one network interface under the current Interfaces
// generation. Exactly one of public, vpc, or vlan is set, so they live in a
// oneof; protojson serializes only the set arm, matching today's omitempty
// pointers.
message InstanceInterface {
  int32 id = 1;
  oneof config {
    InterfacePublicConfig public = 2;
    InterfaceVpcConfig vpc = 3;
    InterfaceVlanConfig vlan = 4;
  }
  InterfaceDefaultRoute default_route = 5;
  optional int32 firewall_id = 6;
  optional string mac_address = 7;
  optional string created = 8;
  optional string updated = 9;
  optional int32 version = 10;
}

// InstanceInterfaceListResponse is the {count, filter?, interfaces} envelope the
// linode_instance_interface_list tool returns. The current Interfaces generation
// endpoint wraps elements under the "interfaces" key (not "data"), so the Go
// fetcher reads that key, but the tool output reuses "interfaces" as the items
// key on both sides.
message InstanceInterfaceListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated InstanceInterface interfaces = 3;
}

// Interface sub-configs under the current Interfaces generation. Exactly one of
// public, vpc, or vlan is set on an InstanceInterface.

message InterfacePublicConfig {
  InterfacePublicIpv4 ipv4 = 1;
  InterfacePublicIpv6 ipv6 = 2;
}

message InterfacePublicIpv4 {
  repeated InterfaceIpv4Address addresses = 1;
}

message InterfacePublicIpv6 {
  repeated InterfaceIpv6Range ranges = 1;
}

message InterfaceIpv4Address {
  string address = 1;
  optional bool primary = 2;
}

message InterfaceIpv6Range {
  string range = 1;
}

message InterfaceVpcConfig {
  int32 subnet_id = 1;
  InterfaceVpcIpv4 ipv4 = 2;
}

message InterfaceVpcIpv4 {
  repeated InterfaceIpv4Address addresses = 1;
}

message InterfaceVlanConfig {
  string vlan_label = 1;
  string ipam_address = 2;
}

message InterfaceDefaultRoute {
  optional bool ipv4 = 1;
  optional bool ipv6 = 2;
}

// InstanceInterfaceSettings is the network interface settings for a Linode
// instance. default_route is omitted when unset; network_helper is nullable.
message InstanceInterfaceSettings {
  InterfaceDefaultRoute default_route = 1;
  optional bool network_helper = 2;
}

// InstanceInterfaceSettingsGetInput is the input contract for
// linode_instance_interface_settings_get.
message InstanceInterfaceSettingsGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
}

// InstanceInterfaceGetInput is the input contract for
// linode_instance_interface_get.
message InstanceInterfaceGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The ID of the Linode interface (required).
  int32 interface_id = 3;
}

// ===== Instance config profiles (GET /linode/instances/{id}/configs) =====

message ConfigDevice {
  optional int32 disk_id = 1;
  optional int32 volume_id = 2;
}

message ConfigHelpers {
  optional bool devtmpfs_automount = 1;
  optional bool distro = 2;
  optional bool modules_dep = 3;
  optional bool network = 4;
  optional bool updatedb_disabled = 5;
}

message ConfigInterfaceIpv4 {
  optional string nat_1_1 = 1;
  optional string vpc = 2;
}

message ConfigInterfaceResponse {
  int32 id = 1;
  bool active = 2;
  string purpose = 3;
  optional string label = 4;
  optional string ipam_address = 5;
  bool primary = 6;
  optional int32 subnet_id = 7;
  optional int32 vpc_id = 8;
  ConfigInterfaceIpv4 ipv4 = 9;
  repeated string ip_ranges = 10;
}

// ConfigInterfaceListResponse is the linode_instance_config_interface_list
// envelope: a count, an optional filter echo, and the legacy config-profile
// network interfaces of one configuration profile. This is the project's own
// {count, interfaces} envelope, not the Linode page list shape.
message ConfigInterfaceListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ConfigInterfaceResponse interfaces = 3;
}

message InstanceConfig {
  int32 id = 1;
  string label = 2;
  string kernel = 3;
  string comments = 4;
  int32 memory_limit = 5;
  string root_device = 6;
  string run_level = 7;
  string virt_mode = 8;
  map<string, ConfigDevice> devices = 9;
  ConfigHelpers helpers = 10;
  repeated ConfigInterfaceResponse interfaces = 11;
  string created = 12;
  string updated = 13;
}

// InstanceConfigListResponse mirrors the linode_instance_config_list wrapper: a
// count, an optional filter echo, and the configuration profiles. This is the
// project's own envelope, not the Linode {data,page,pages,results} list shape.
message InstanceConfigListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated InstanceConfig configs = 3;
}

// ===== Instance disks (GET /linode/instances/{id}/disks) =====

message InstanceDisk {
  int32 id = 1;
  string label = 2;
  string status = 3;
  int32 size = 4;
  string filesystem = 5;
  string created = 6;
  string updated = 7;
}

// InstanceDiskListResponse mirrors the linode_instance_disk_list wrapper: a
// count, an optional filter echo, and the disks. This is the project's own
// envelope, not the Linode {data,page,pages,results} list shape.
message InstanceDiskListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated InstanceDisk disks = 3;
}

// ===== Instance backups (GET /linode/instances/{id}/backups) =====

message InstanceBackupDisk {
  string label = 1;
  int32 size = 2;
  string filesystem = 3;
}

message InstanceBackup {
  int32 id = 1;
  string label = 2;
  string status = 3;
  string type = 4;
  string created = 5;
  string updated = 6;
  string finished = 7;
  string region = 8;
  bool available = 9;
  repeated string configs = 10;
  repeated InstanceBackupDisk disks = 11;
}

message InstanceBackupSnapshots {
  InstanceBackup current = 1;
  InstanceBackup in_progress = 2;
}

// InstanceBackupGetInput is the input contract for linode_instance_backup_get.
message InstanceBackupGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The ID of the backup to retrieve (required).
  int32 backup_id = 3;
}

// InstanceConfigInterfaceGetInput is the input contract for
// linode_instance_config_interface_get.
message InstanceConfigInterfaceGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The ID of the configuration profile (required).
  int32 config_id = 3;
  // The ID of the configuration profile interface (required).
  int32 interface_id = 4;
}

message InstanceBackupsResponse {
  repeated InstanceBackup automatic = 1;
  InstanceBackupSnapshots snapshot = 2;
}

// ===== Instance interface history (current Interfaces generation) =====

message InstanceInterfaceHistory {
  int32 interface_history_id = 1;
  int32 interface_id = 2;
  int32 linode_id = 3;
  int32 version = 4;
  string created = 5;
  // interface_data is a free-form snapshot of the interface at that version.
  google.protobuf.Struct interface_data = 6;
}

// InstanceInterfaceHistoryListResponse is the
// linode_instance_interface_history_list envelope: a count, an optional filter
// echo, and the historical interface versions of one Linode instance.
message InstanceInterfaceHistoryListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated InstanceInterfaceHistory interface_history = 3;
}

// InstanceListResponse mirrors the linode_instance_list wrapper: a count, an
// optional filter echo, and the instances. This is the project's own envelope,
// not the Linode {data,page,pages,results} list shape.
message InstanceListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Instance instances = 3;
}

// InstanceWriteResponse is the {message, instance} envelope the instance write
// tools (create, update, clone, rebuild) return: a human-readable confirmation
// plus the affected instance.
message InstanceWriteResponse {
  string message = 1;
  Instance instance = 2;
}

// InstanceDeleteResponse is the id-echo envelope linode_instance_delete
// returns: a confirmation message plus the deleted instance's ID. The delete
// endpoint returns an empty body, so the id echo confirms the target. The field
// is instance_id (not linode_id) to match the existing tool output key.
message InstanceDeleteResponse {
  string message = 1;
  int32 instance_id = 2;
}

// InstanceConfigWriteResponse is the {message, config} envelope the config-profile
// write tools (create, update) return: a confirmation plus the affected profile.
message InstanceConfigWriteResponse {
  string message = 1;
  InstanceConfig config = 2;
}

// ConfigInterfaceWriteResponse is the {message, interface} envelope the
// config-profile interface write tools (add, update) return: a confirmation plus
// the affected legacy config-profile network interface.
message ConfigInterfaceWriteResponse {
  string message = 1;
  ConfigInterfaceResponse interface = 2;
}

// InstanceInterfaceWriteResponse is the {message, interface} envelope the
// current-generation interface write tools (add, update) return: a confirmation
// plus the affected Linode network interface.
message InstanceInterfaceWriteResponse {
  string message = 1;
  InstanceInterface interface = 2;
}

// InstanceInterfaceSettingsWriteResponse is the {message, settings} envelope
// linode_instance_interface_settings_update returns: a confirmation plus the
// updated interface settings.
message InstanceInterfaceSettingsWriteResponse {
  string message = 1;
  InstanceInterfaceSettings settings = 2;
}

// InstanceInterfaceUpgradeWriteResponse is the {message, ...body} envelope
// linode_instance_interface_upgrade returns. The upgrade endpoint returns a body
// of its own (config_id, dry_run, interfaces), so these wrap that body under a
// confirmation message.
message InstanceInterfaceUpgradeWriteResponse {
  string message = 1;
  int32 config_id = 2;
  bool dry_run = 3;
  repeated InstanceInterface interfaces = 4;
}

// InstanceDiskWriteResponse is the {message, disk} envelope the instance disk
// write tools (create, update, clone) return: a confirmation plus the disk.
message InstanceDiskWriteResponse {
  string message = 1;
  InstanceDisk disk = 2;
}

// InstanceBackupWriteResponse is the {message, backup} envelope
// linode_instance_backup_create returns: a confirmation plus the new snapshot.
message InstanceBackupWriteResponse {
  string message = 1;
  InstanceBackup backup = 2;
}

// InstanceDiskResizeWriteResponse is the {message, ids} echo
// linode_instance_disk_resize returns. The resize endpoint returns no resource
// body, so these echo the request: the target Linode, the disk, and its new size.
message InstanceDiskResizeWriteResponse {
  string message = 1;
  int32 linode_id = 2;
  int32 disk_id = 3;
  int32 new_size_mb = 4;
}

// InstanceBackupRestoreWriteResponse is the {message, ids} echo
// linode_instance_backup_restore returns. The restore endpoint returns no
// resource body, so these echo the request: the backup, the target Linode, and
// whether the target was overwritten.
message InstanceBackupRestoreWriteResponse {
  string message = 1;
  int32 backup_id = 2;
  int32 target_linode_id = 3;
  bool overwrite = 4;
}

// InstanceActionWriteResponse is the {message, linode_id} echo the instance
// action tools whose endpoints return no resource body (mutate, firewall apply,
// rescue, backups enable/cancel, password reset) return: a confirmation plus the
// affected Linode id.
message InstanceActionWriteResponse {
  string message = 1;
  int32 linode_id = 2;
}

// InstancePowerActionResponse is the {message, instance_id} echo the instance
// power tools (boot, reboot, shutdown) return. These endpoints return no
// resource body, so the id echoes the request. The id field is instance_id
// (not linode_id) to match the power tools' input schema and legacy output.
message InstancePowerActionResponse {
  string message = 1;
  int32 instance_id = 2;
}

// InstanceMigrateWriteResponse is the {message, linode_id, region?} echo
// linode_instance_migrate returns. The migrate endpoint returns no resource
// body, so these echo the request: the affected Linode and, when the caller
// picked a destination, the target region. region is explicit-presence so it is
// omitted from the output when the caller let Linode pick the region.
message InstanceMigrateWriteResponse {
  string message = 1;
  int32 linode_id = 2;
  optional string region = 3;
}

// InstanceResizeWriteResponse is the {message, instance_id, new_type} echo
// linode_instance_resize returns. The resize endpoint returns no resource body,
// so these echo the request: the affected Linode and the plan type it is
// resizing to.
message InstanceResizeWriteResponse {
  string message = 1;
  int32 instance_id = 2;
  string new_type = 3;
}

// InstanceDiskActionResponse is the {message, linode_id, disk_id} echo the
// instance disk action tools whose endpoints return no resource body (disk
// password reset) return: a confirmation plus the affected Linode and disk ids.
message InstanceDiskActionResponse {
  string message = 1;
  int32 linode_id = 2;
  int32 disk_id = 3;
}

// InstanceGetInput is the input contract for linode_instance_get. The generated
// JSON Schema becomes the tool's MCP inputSchema. A plain (non-optional) field
// is required in the schema; an optional field is not. No external validation
// annotation is needed.
message InstanceGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to retrieve (required).
  string instance_id = 2;
}

// InstanceListInput is the input contract for linode_instance_list. Both fields
// are optional, so the generated schema has no required entries.
message InstanceListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Filter instances by status (running, stopped, etc.).
  optional string status = 2;
}

// InstanceBootInput is the input contract for linode_instance_boot.
// instance_id and confirm are required.
message InstanceBootInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to boot (required).
  int32 instance_id = 2;
  // The ID of the configuration profile to boot with (optional).
  optional int32 config_id = 3;
  // Must be set to true to confirm booting the instance. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// InstanceRebootInput is the input contract for linode_instance_reboot.
// instance_id and confirm are required.
message InstanceRebootInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to reboot (required).
  int32 instance_id = 2;
  // The ID of the configuration profile to boot with after reboot (optional).
  optional int32 config_id = 3;
  // Must be set to true to confirm rebooting the instance. This causes a brief
  // outage. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// InstanceShutdownInput is the input contract for linode_instance_shutdown.
// instance_id and confirm are required.
message InstanceShutdownInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to shut down (required).
  int32 instance_id = 2;
  // Must be set to true to confirm shutting down the instance. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// InstanceCreateInput is the input contract for linode_instance_create.
// region, type, firewall_id, and confirm are required.
message InstanceCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The region where the instance will be created (e.g., 'us-east').
  string region = 2;
  // The Linode plan type (e.g., 'g6-nanode-1').
  string type = 3;
  // A label for the instance (optional).
  optional string label = 4;
  // The image ID to deploy (e.g., 'linode/debian11'). Required for provisioned
  // instances.
  optional string image = 5;
  // Root password for the instance (optional). At least one of root_pass,
  // authorized_keys, or authorized_users must be non-empty.
  optional string root_pass = 6;
  // Cloud Firewall ID to attach to the public interface. Required under the
  // current Linode Interfaces generation.
  int32 firewall_id = 7;
  // Whether the public interface owns the IPv4 default route (optional,
  // default: true).
  optional bool route_ipv4 = 8;
  // Whether the public interface owns the IPv6 default route (optional,
  // default: true).
  optional bool route_ipv6 = 9;
  // Enable backups for this instance (optional, default: false).
  optional bool backups_enabled = 10;
  // SSH public keys to install for the root user (optional). Requires an
  // image.
  repeated string authorized_keys = 11;
  // Whether to boot the instance after creation (optional, defaults to true
  // when an image is provided).
  optional bool booted = 12;
  // Must be set to true to confirm instance creation. This operation incurs
  // billing charges. Ignored when dry_run=true.
  bool confirm = 13;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 14;
  // Linode usernames whose SSH keys to install (optional). At least one of
  // root_pass, authorized_keys, or authorized_users must be non-empty.
  repeated string authorized_users = 15;
}

// InstanceUpdateInput is the input contract for linode_instance_update.
// instance_id and confirm are required. alerts is a free-form threshold object
// and tags is a string array, both optional.
message InstanceUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the instance to update (required).
  int32 instance_id = 2;
  // New Linode label (optional).
  optional string label = 3;
  // Deprecated group label (optional).
  optional string group = 4;
  // Tags to assign to the Linode (optional).
  repeated string tags = 5;
  // Alert threshold settings (optional).
  map<string, google.protobuf.Value> alerts = 6;
  // Maintenance policy, such as linode/migrate (optional).
  optional string maintenance_policy = 7;
  // Whether the Lassie shutdown watchdog is enabled (optional).
  optional bool watchdog_enabled = 8;
  // Must be set to true to confirm the update. Ignored when dry_run=true.
  bool confirm = 9;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 10;
}

// InstanceDeleteInput is the input contract for linode_instance_delete, a
// two-stage destroy: instance_id and confirm are required, and mode/plan_id
// drive the plan/apply flow.
message InstanceDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to delete (required).
  int32 instance_id = 2;
  // Must be set to true to confirm deletion. This action is irreversible.
  // Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with
  // plan_id re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// InstanceCloneInput is the input contract for linode_instance_clone.
// linode_id and confirm are required.
message InstanceCloneInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to clone (required).
  int32 linode_id = 2;
  // Region for the cloned instance (optional, defaults to same region).
  optional string region = 3;
  // Instance type for the clone (optional, defaults to same type).
  optional string type = 4;
  // Label for the cloned instance (optional).
  optional string label = 5;
  // Enable backups on the cloned instance (optional).
  optional bool backups_enabled = 6;
  // Config profile IDs to clone (optional). Defaults to all configs when
  // omitted.
  repeated int32 configs = 7;
  // Disk IDs to clone (optional). Defaults to all disks when omitted.
  repeated int32 disks = 8;
  // Must be true to confirm instance cloning. This creates a billable
  // resource. Ignored when dry_run=true.
  bool confirm = 9;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 10;
}

// InstanceMigrateInput is the input contract for linode_instance_migrate.
// linode_id and confirm are required.
message InstanceMigrateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to migrate (required).
  int32 linode_id = 2;
  // Target region for migration (optional, Linode picks if omitted).
  optional string region = 3;
  // Must be true to confirm migration. The instance will be shut down during
  // migration. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// InstanceMutateInput is the input contract for linode_instance_mutate.
// linode_id and confirm are required.
message InstanceMutateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to upgrade (required).
  int32 linode_id = 2;
  // Automatically resize disks during the upgrade when possible (optional,
  // API default: true).
  optional bool allow_auto_disk_resize = 3;
  // Must be true to confirm the instance upgrade. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// InstanceRebuildInput is the input contract for linode_instance_rebuild, a
// two-stage destroy: linode_id, image, authentication, and confirm are required,
// and mode/plan_id drive the plan/apply flow.
message InstanceRebuildInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance to rebuild (required).
  int32 linode_id = 2;
  // The image to rebuild with (e.g. 'linode/ubuntu24.04'). Use
  // linode_image_list to find valid values.
  string image = 3;
  // Root password for the rebuilt instance (optional; when supplied, min 12
  // chars with upper/lower/digits).
  optional string root_pass = 4;
  // SSH public keys to add to root's authorized_keys (optional).
  repeated string authorized_keys = 5;
  // Linode usernames whose SSH keys to add (optional).
  repeated string authorized_users = 6;
  // Whether to boot the instance after rebuild (optional, defaults to true).
  optional bool booted = 7;
