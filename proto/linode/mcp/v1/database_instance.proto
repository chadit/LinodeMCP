// an explicit JSON null at runtime to detach the VPC.
message DatabaseMySQLInstanceUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The MySQL Managed Database instance ID to update.
  int32 instance_id = 2;
  // CIDR strings (IPv4/IPv6 addresses or ranges) allowed to connect (optional).
  repeated string allow_list = 3;
  // JSON object of MySQL engine configuration values (optional).
  map<string, google.protobuf.Value> engine_config = 4;
  // New label for the database instance (optional).
  optional string label = 5;
  // Object placing the database in a VPC (vpc_id, subnet_id, public_access).
  // Pass null to detach (optional).
  map<string, google.protobuf.Value> private_network = 6;
  // New Linode type for the database instance (optional).
  optional string type = 7;
  // Object of maintenance update settings (optional).
  map<string, google.protobuf.Value> updates = 8;
  // New MySQL version for the database instance (optional).
  optional string version = 9;
  // Must be true to confirm database update. Ignored when dry_run=true.
  bool confirm = 10;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 11;
}

