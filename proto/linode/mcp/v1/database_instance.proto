// DatabaseMySQLInstanceCreateInput is the input contract for
// linode_database_mysql_instance_create. The engine_config, fork, and
// private_network params are free-form objects, so each is a
// map<string, google.protobuf.Value> that renders top-level {"type":"object"};
// the runtime handler validates their inner shape.
message DatabaseMySQLInstanceCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Label for the database instance.
  string label = 2;
  // Linode type for the database instance.
  string type = 3;
  // Database engine ID, for example mysql/8.0.26.
  string engine = 4;
  // Region for the database instance.
  string region = 5;
  // CIDR strings (IPv4/IPv6 addresses or ranges) allowed to connect (optional).
  repeated string allow_list = 6;
  // Number of nodes in the cluster (optional).
  optional int32 cluster_size = 7;
  // JSON object of MySQL engine configuration values (optional).
  map<string, google.protobuf.Value> engine_config = 8;
  // Object describing source database fork/restore settings (optional).
  map<string, google.protobuf.Value> fork = 9;
  // Object placing the database in a VPC (vpc_id, subnet_id, public_access).
  // Omit for no private networking (optional).
  map<string, google.protobuf.Value> private_network = 10;
  // Whether to require SSL connections (optional).
  optional bool ssl_connection = 11;
  // Must be true to confirm database creation. This creates a billable
  // resource. Ignored when dry_run=true.
  bool confirm = 12;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 13;
}

