syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// LKEKubeconfig is the base64-encoded kubeconfig for an LKE cluster.
message LKEKubeconfig {
  string kubeconfig = 1;
}

// LKEKubeconfigGetInput is the input contract for linode_lke_kubeconfig_get.
message LKEKubeconfigGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the LKE cluster (required).
  string cluster_id = 2;
}

// LKEKubeconfigDeleteResponse is the id-echo envelope
// linode_lke_kubeconfig_delete returns: a confirmation message plus the LKE
// cluster ID whose kubeconfig was deleted and regenerated.
message LKEKubeconfigDeleteResponse {
  string message = 1;
  int32 cluster_id = 2;
}

// LKEKubeconfigDeleteInput is the input contract for
// linode_lke_kubeconfig_delete.
message LKEKubeconfigDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the LKE cluster.
  int32 cluster_id = 2;
  // Must be true to confirm kubeconfig deletion. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}
