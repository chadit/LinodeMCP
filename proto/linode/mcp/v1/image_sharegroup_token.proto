syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// ImageShareGroupToken is one share group token. updated and expiry are nullable
// (omitted when unset).
message ImageShareGroupToken {
  string token = 1;
  string token_uuid = 2;
  string status = 3;
  string label = 4;
  string created = 5;
  optional string updated = 6;
  optional string expiry = 7;
  string valid_for_sharegroup_uuid = 8;
  string sharegroup_uuid = 9;
  string sharegroup_label = 10;
}

// ImageShareGroupTokenWriteResponse is the {message, token} envelope the share
// group token create/update tools return.
message ImageShareGroupTokenWriteResponse {
  string message = 1;
  ImageShareGroupToken token = 2;
}

// ImageShareGroupTokenDeleteResponse is the confirmation envelope
// linode_image_sharegroup_token_delete returns. The delete endpoint returns an
// empty body; only a message is emitted so the token secret is never echoed.
message ImageShareGroupTokenDeleteResponse {
  string message = 1;
}

// ImageShareGroupTokenListResponse is the linode_image_sharegroup_token_list
// envelope: count, an optional filter echo, and the share group token elements.
message ImageShareGroupTokenListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ImageShareGroupToken image_sharegroup_tokens = 3;
}

// ImageShareGroupTokenGetInput is the input contract for
// linode_image_sharegroup_token_get.
message ImageShareGroupTokenGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The image share group token UUID (required).
  string token_uuid = 2;
}

// ImageShareGroupTokenListInput is the input contract for
// linode_image_sharegroup_token_list.
message ImageShareGroupTokenListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ImageShareGroupTokenCreateInput is the input contract for
// linode_image_sharegroup_token_create. valid_for_sharegroup_uuid and confirm
// are required; label is optional.
message ImageShareGroupTokenCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The UUID of the share group this token is valid for.
  string valid_for_sharegroup_uuid = 2;
  // Optional descriptive label for the token.
  optional string label = 3;
  // Must be set to true to confirm token creation. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// ImageShareGroupTokenUpdateInput is the input contract for
// linode_image_sharegroup_token_update. token_uuid, label, and confirm are
// required.
message ImageShareGroupTokenUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The UUID of the token to update.
  string token_uuid = 2;
  // The new descriptive label for the token.
  string label = 3;
  // Must be set to true to confirm the token update. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// ImageShareGroupTokenDeleteInput is the input contract for
// linode_image_sharegroup_token_delete, a two-stage destroy.
message ImageShareGroupTokenDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Image share group token UUID.
  string token_uuid = 2;
  // Must be set to true to confirm deletion. This action is irreversible.
  // Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// ImageShareGroupTokenImageListInput is the input contract for
// linode_image_sharegroup_token_image_list.
message ImageShareGroupTokenImageListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Image share group token UUID.
  string token_uuid = 2;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 3;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 4;
}
