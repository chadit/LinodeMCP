syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// ManagedServiceType is the Managed monitored-service protocol. Values are the
// exact lowercase API strings, authored from the live OpenAPI spec. See the
// enum-wrapper convention in nodebalancer_config.proto.
message ManagedServiceType {
  enum Value {
    unspecified = 0;
    tcp = 1;
    url = 2;
  }
}

// ManagedService mirrors a Linode Managed monitored service. body, notes, and
// region are nullable (omitted when unset); credentials is repeated (emitted as []).
message ManagedService {
  int32 id = 1;
  string label = 2;
  string service_type = 3;
  string status = 4;
  string address = 5;
  optional string body = 6;
  string consultation_group = 7;
  string created = 8;
  repeated int32 credentials = 9;
  optional string notes = 10;
  optional string region = 11;
  int32 timeout = 12;
  string updated = 13;
}

// ManagedServiceListResponse is the {count, filter?, managed_services} envelope
// the linode_managed_service_list tool returns.
message ManagedServiceListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ManagedService managed_services = 3;
}

// ManagedServiceGetInput is the input contract for linode_managed_service_get.
message ManagedServiceGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Managed service to retrieve (required).
  int32 service_id = 2;
}

// ManagedServiceListInput is the input contract for
// linode_managed_service_list.
message ManagedServiceListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ManagedServiceCreateInput is the input contract for
// linode_managed_service_create. address, label, service_type, timeout, and
// confirm are required.
message ManagedServiceCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Label for the Managed service.
  string label = 2;
  // Monitor type: tcp or url.
  ManagedServiceType.Value service_type = 3;
  // URL or address monitored by the service.
  string address = 4;
  // Timeout in seconds, 1-255.
  int32 timeout = 5;
  // Expected response body text for URL monitors.
  optional string body = 6;
  // Managed contact group to consult when an issue is detected.
  optional string consultation_group = 7;
  // Managed credential IDs used when resolving service issues.
  repeated int32 credentials = 8;
  // Notes for responders.
  optional string notes = 9;
  // Region for private IP services.
  optional string region = 10;
  // Must be true to confirm Managed service creation. Ignored when
  // dry_run=true.
  bool confirm = 11;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 12;
}

// ManagedServiceUpdateInput is the input contract for
// linode_managed_service_update. service_id and confirm are required; all
// mutable fields are optional.
message ManagedServiceUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric Managed service monitor ID to update.
  int32 service_id = 2;
  // Updated label for the Managed service.
  optional string label = 3;
  // Updated monitor type: tcp or url.
  optional ManagedServiceType.Value service_type = 4;
  // Updated URL or address monitored by the service.
  optional string address = 5;
  // Updated timeout in seconds, 1-255.
  optional int32 timeout = 6;
  // Updated expected response body text for URL monitors.
  optional string body = 7;
  // Updated Managed contact group to consult when an issue is detected.
  optional string consultation_group = 8;
  // Updated Managed credential IDs used when resolving service issues.
  repeated int32 credentials = 9;
  // Updated notes for responders.
  optional string notes = 10;
  // Updated region for private IP services.
  optional string region = 11;
  // Must be true to confirm Managed service update. Ignored when dry_run=true.
  bool confirm = 12;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 13;
}

// ManagedServiceDeleteInput is the input contract for
// linode_managed_service_delete. Plain confirm destroy.
message ManagedServiceDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The Managed service monitor ID to delete.
  int32 service_id = 2;
  // Must be true to confirm Managed service deletion. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// ManagedServiceDisableInput is the input contract for
// linode_managed_service_disable.
message ManagedServiceDisableInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The Managed service monitor ID to disable.
  int32 service_id = 2;
  // Must be true to confirm disabling Managed service monitoring. Ignored
  // when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// ManagedServiceEnableInput is the input contract for
// linode_managed_service_enable.
message ManagedServiceEnableInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The Managed service monitor ID to enable.
  int32 service_id = 2;
  // Must be true to confirm enabling Managed service monitoring. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// ManagedLinodeSettingsSSH is the SSH access block nested in Managed Linode
// settings. port and user are nullable (omitted when unset).
message ManagedLinodeSettingsSSH {
  bool access = 1;
  string ip = 2;
  optional int32 port = 3;
  optional string user = 4;
}

// ManagedLinodeSettings mirrors the Linode Managed settings for one Linode.
message ManagedLinodeSettings {
  int32 id = 1;
  string label = 2;
  string group = 3;
  ManagedLinodeSettingsSSH ssh = 4;
}

// ManagedLinodeSettingsListResponse is the {count, filter?, managed_linode_settings}
// envelope the linode_managed_linode_settings_list tool returns.
message ManagedLinodeSettingsListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ManagedLinodeSettings managed_linode_settings = 3;
}

// ManagedLinodeSettingsGetInput is the input contract for
// linode_managed_linode_settings_get.
message ManagedLinodeSettingsGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode whose Managed settings to retrieve (required).
  int32 linode_id = 2;
}

// ManagedLinodeSettingsListInput is the input contract for
// linode_managed_linode_settings_list.
message ManagedLinodeSettingsListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ManagedLinodeSettingsUpdateInput is the input contract for
// linode_managed_linode_settings_update. linode_id and confirm are required.
// The ssh param is a required object { access: bool, ip: string, port: int
// (1-65535), user: string }; it is rendered here as
// map<string, google.protobuf.Value> (top-level object), which drops the
// required flag and the inner detail. The handler still enforces presence and
// at least one mutable SSH setting.
message ManagedLinodeSettingsUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric Linode ID whose Managed settings should be updated.
  int32 linode_id = 2;
  // SSH settings object: { access: bool, ip: string, port: int (1-65535),
  // user: string }.
  map<string, google.protobuf.Value> ssh = 3;
  // Must be true to confirm updating Managed Linode settings. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// ManagedContactPhone is the phone block nested in a Managed contact. primary and
// secondary are nullable (omitted when unset).
message ManagedContactPhone {
  optional string primary = 1;
  optional string secondary = 2;
}

// ManagedContact mirrors a Linode Managed contact. group is nullable (omitted when
// unset).
message ManagedContact {
  int32 id = 1;
  string name = 2;
  string email = 3;
  optional string group = 4;
  ManagedContactPhone phone = 5;
  string updated = 6;
}

// ManagedContactListResponse is the {count, filter?, managed_contacts} envelope
// the linode_managed_contact_list tool returns.
message ManagedContactListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ManagedContact managed_contacts = 3;
}

// ManagedContactGetInput is the input contract for linode_managed_contact_get.
message ManagedContactGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Managed contact to retrieve (required).
  int32 contact_id = 2;
}

// ManagedContactListInput is the input contract for
// linode_managed_contact_list.
message ManagedContactListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ManagedContactCreateInput is the input contract for
// linode_managed_contact_create. Only confirm is required. The phone param is
// an object { primary: string, secondary: string }; it is rendered as
// map<string, google.protobuf.Value> (top-level object), which drops the inner
// detail (the handler still parses primary/secondary).
message ManagedContactCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Name for the Managed contact (optional).
  optional string name = 2;
  // Email address for the Managed contact (optional).
  optional string email = 3;
  // Display grouping for the Managed contact (optional).
  optional string group = 4;
  // Phone numbers object: { primary: string, secondary: string } (optional).
  map<string, google.protobuf.Value> phone = 5;
  // Must be true to confirm Managed contact creation. Ignored when
  // dry_run=true.
  bool confirm = 6;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 7;
}

// ManagedContactUpdateInput is the input contract for
// linode_managed_contact_update. contact_id and confirm are required. The
// phone param is an object { primary: string, secondary: string }; it is
// rendered as map<string, google.protobuf.Value> (top-level object), which
// drops the inner detail (the handler still parses primary/secondary).
message ManagedContactUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric Managed contact ID to update.
  int32 contact_id = 2;
  // Updated contact name (optional).
  optional string name = 3;
  // Updated contact email address (optional).
  optional string email = 4;
  // Updated contact group (optional).
  optional string group = 5;
  // Updated phone numbers object: { primary: string, secondary: string }
  // (optional).
  map<string, google.protobuf.Value> phone = 6;
  // Must be true to confirm updating the Managed contact. Ignored when
  // dry_run=true.
  bool confirm = 7;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 8;
}

// ManagedContactDeleteInput is the input contract for
// linode_managed_contact_delete. Plain confirm destroy.
message ManagedContactDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The Managed contact ID to delete.
  int32 contact_id = 2;
  // Must be true to confirm Managed contact deletion. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// ManagedSSHKey mirrors GET /managed/credentials/sshkey: the public SSH key the
// Managed service installs on monitored Linodes.
message ManagedSSHKey {
  string ssh_key = 1;
}

// ManagedSSHKeyGetInput is the input contract for linode_managed_sshkey_get.
message ManagedSSHKeyGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
}

// ManagedStatsGetInput is the input contract for linode_managed_stats_get.
message ManagedStatsGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
}

// ManagedCredential mirrors a Linode Managed credential (the secret is write-only
// and never returned).
message ManagedCredential {
  int32 id = 1;
  string label = 2;
  string last_decrypted = 3;
}

// ManagedCredentialListResponse is the {count, filter?, managed_credentials}
// envelope the linode_managed_credential_list tool returns. The secret material
// is write-only and never present in the list body.
message ManagedCredentialListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated ManagedCredential managed_credentials = 3;
}

// ManagedCredentialGetInput is the input contract for linode_managed_credential_get.
message ManagedCredentialGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Managed credential to retrieve (required).
  int32 credential_id = 2;
  // Preview the request without retrieving it (optional).
  optional bool dry_run = 3;
}

// ManagedCredentialListInput is the input contract for
// linode_managed_credential_list.
message ManagedCredentialListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ManagedCredentialCreateInput is the input contract for
// linode_managed_credential_create. label, password, and confirm are required.
message ManagedCredentialCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Label for the Managed credential.
  string label = 2;
  // Password to store for the Managed credential.
  string password = 3;
  // Username to store for the Managed credential.
  optional string username = 4;
  // Must be true to confirm creating a stored Managed credential. Ignored
  // when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// ManagedCredentialUpdateInput is the input contract for
// linode_managed_credential_update. credential_id, label, and confirm are
// required.
message ManagedCredentialUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The numeric Managed credential ID to update.
  int32 credential_id = 2;
  // Updated credential label.
  string label = 3;
  // Must be true to confirm updating the Managed credential. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// ManagedCredentialUsernamePasswordUpdateInput is the input contract for
// linode_managed_credential_username_password_update. credential_id, password,
// and confirm are required; username is optional.
message ManagedCredentialUsernamePasswordUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Managed credential ID to update.
  int32 credential_id = 2;
  // Updated password to store for the Managed credential.
  string password = 3;
  // Updated username to store for the Managed credential.
  optional string username = 4;
  // Must be true to confirm updating a stored Managed credential's username
  // and password. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// ManagedCredentialRevokeInput is the input contract for
// linode_managed_credential_revoke.
message ManagedCredentialRevokeInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Managed credential ID to revoke.
  int32 credential_id = 2;
  // Must be true to confirm revoking the stored Managed credential. Ignored
  // when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// ManagedCredentialWriteResponse is the {message, credential} envelope the
// linode_managed_credential_update tool returns after a successful update.
message ManagedCredentialWriteResponse {
  string message = 1;
  ManagedCredential credential = 2;
}

// ManagedCredentialIDResponse is the {message, credential_id} id-echo the
// linode_managed_credential_revoke and linode_managed_credential_username_password_update
// tools return; their endpoints have no resource body to echo.
message ManagedCredentialIDResponse {
  string message = 1;
  int32 credential_id = 2;
}

// ManagedContactWriteResponse is the {message, contact} envelope the
// linode_managed_contact_update tool returns after a successful update.
message ManagedContactWriteResponse {
  string message = 1;
  ManagedContact contact = 2;
}

// ManagedContactIDResponse is the {message, contact_id} id-echo the
// linode_managed_contact_delete tool returns; the delete endpoint has no
// resource body to echo.
message ManagedContactIDResponse {
  string message = 1;
  int32 contact_id = 2;
}

// ManagedServiceIDResponse is the {message, service_id} id-echo the
// linode_managed_service_delete, _enable, and _disable tools return; those
// endpoints have no resource body to echo.
message ManagedServiceIDResponse {
  string message = 1;
  int32 service_id = 2;
}

// ManagedServiceWriteResponse is the {message, service} envelope the
// linode_managed_service_create and linode_managed_service_update tools return
// after a successful write.
message ManagedServiceWriteResponse {
  string message = 1;
  ManagedService service = 2;
}

// ManagedLinodeSettingsWriteResponse is the {message, settings} envelope the
// linode_managed_linode_settings_update tool returns after a successful update.
message ManagedLinodeSettingsWriteResponse {
  string message = 1;
  ManagedLinodeSettings settings = 2;
}
