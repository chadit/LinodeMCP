syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// DatabaseEngine is one Managed Database engine version.
message DatabaseEngine {
  string id = 1;
  string engine = 2;
  string version = 3;
}

// DatabaseEngineListResponse is the linode_database_engine_list envelope: count
// and the full proto DatabaseEngine elements. Pagination does not echo a filter.
message DatabaseEngineListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated DatabaseEngine database_engines = 3;
}

// DatabaseEngineGetInput is the input contract for linode_database_engine_get.
message DatabaseEngineGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The Managed Database engine ID, for example mysql/8.0.26 (required).
  string engine_id = 2;
}

// DatabaseEngineListInput is the input contract for
// linode_database_engine_list.
message DatabaseEngineListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}
