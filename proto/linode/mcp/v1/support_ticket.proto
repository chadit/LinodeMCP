syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// SupportTicketAttachment is one file attached to a support ticket.
message SupportTicketAttachment {
  string filename = 1;
  int32 id = 2;
  int32 size = 3;
}

// SupportTicketEntity is the resource a support ticket is about. id is a
// passthrough value (the API returns an int or string depending on entity type).
message SupportTicketEntity {
  google.protobuf.Value id = 1;
  string label = 2;
  string type = 3;
  string url = 4;
}

// SupportTicket mirrors a Linode support ticket. attachments is repeated (emitted
// as []); closed is nullable (omitted when unset); entity is omitted when unset.
message SupportTicket {
  repeated SupportTicketAttachment attachments = 1;
  bool closable = 2;
  optional string closed = 3;
  string description = 4;
  SupportTicketEntity entity = 5;
  string gravatar_id = 6;
  int32 id = 7;
  string opened = 8;
  string opened_by = 9;
  string status = 10;
  string summary = 11;
  string updated = 12;
  string updated_by = 13;
}

// SupportTicketListResponse is the linode_support_ticket_list envelope: count
// and the full proto SupportTicket elements. The tool paginates and has no
// filter params, so filter is omitted.
message SupportTicketListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated SupportTicket support_tickets = 3;
}

// SupportTicketGetInput is the input contract for linode_support_ticket_get.
message SupportTicketGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the support ticket to retrieve (required).
  int32 ticket_id = 2;
}

// SupportTicketReply mirrors one reply from
// GET /support/tickets/{ticket_id}/replies. All fields are present scalars.
message SupportTicketReply {
  string created = 1;
  string created_by = 2;
  string description = 3;
  string gravatar_id = 4;
  int32 id = 5;
  string updated = 6;
  string updated_by = 7;
}

// SupportTicketReplyListResponse is the linode_support_ticket_reply_list
// envelope: count and the full proto SupportTicketReply elements. The tool
// paginates and has no filter params, so filter is omitted.
message SupportTicketReplyListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated SupportTicketReply support_ticket_replies = 3;
}

// SupportTicketWriteResponse is the {message, ticket} envelope the support
// ticket create tool returns: a confirmation string plus the full SupportTicket
// element the API returns for the opened ticket.
message SupportTicketWriteResponse {
  string message = 1;
  SupportTicket ticket = 2;
}

// SupportTicketReplyWriteResponse is the {message, reply} envelope the support
// ticket reply create tool returns: a confirmation string plus the full
// SupportTicketReply element the API returns for the new reply.
message SupportTicketReplyWriteResponse {
  string message = 1;
  SupportTicketReply reply = 2;
}

// SupportTicketIDResponse is the {message, ticket_id} id-echo the support ticket
// attachment create and close tools return; those endpoints return no resource
// body to echo, so the response carries the affected ticket id.
message SupportTicketIDResponse {
  string message = 1;
  int32 ticket_id = 2;
}

// SupportTicketListInput is the input contract for linode_support_ticket_list.
message SupportTicketListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// SupportTicketCreateInput is the input contract for
// linode_support_ticket_create. summary, description, and confirm are
// required; the entity references are optional and mutually independent.
message SupportTicketCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Short summary for the support ticket.
  string summary = 2;
  // Detailed support ticket description.
  string description = 3;
  // Object Storage bucket related to the ticket (optional).
  optional string bucket = 4;
  // Database ID related to the ticket (optional).
  optional int32 database_id = 5;
  // Domain ID related to the ticket (optional).
  optional int32 domain_id = 6;
  // Firewall ID related to the ticket (optional).
  optional int32 firewall_id = 7;
  // Linode ID related to the ticket (optional).
  optional int32 linode_id = 8;
  // LKE cluster ID related to the ticket (optional).
  optional int32 lkecluster_id = 9;
  // Longview client ID related to the ticket (optional).
  optional int32 longviewclient_id = 10;
  // Whether the ticket concerns a Managed service issue (optional).
  optional bool managed_issue = 11;
  // NodeBalancer ID related to the ticket (optional).
  optional int32 nodebalancer_id = 12;
  // Region related to the ticket (optional).
  optional string region = 13;
  // Support ticket severity level 1, 2, or 3 (optional).
  optional int32 severity = 14;
  // VLAN related to the ticket (optional).
  optional string vlan = 15;
  // Volume ID related to the ticket (optional).
  optional int32 volume_id = 16;
  // VPC ID related to the ticket (optional).
  optional int32 vpc_id = 17;
  // Must be true to confirm support ticket creation. Ignored when
  // dry_run=true.
  bool confirm = 18;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 19;
}

// SupportTicketCloseInput is the input contract for
// linode_support_ticket_close.
message SupportTicketCloseInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Support ticket ID to close.
  int32 ticket_id = 2;
  // Must be true to confirm closing the support ticket. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}

// SupportTicketReplyListInput is the input contract for
// linode_support_ticket_reply_list.
message SupportTicketReplyListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Support ticket ID whose replies should be listed.
  int32 ticket_id = 2;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 3;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 4;
}

// SupportTicketReplyCreateInput is the input contract for
// linode_support_ticket_reply_create.
message SupportTicketReplyCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Support ticket ID to reply to.
  int32 ticket_id = 2;
  // Reply description to add to the support ticket.
  string description = 3;
  // Must be true to confirm support ticket reply creation. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// SupportTicketAttachmentCreateInput is the input contract for
// linode_support_ticket_attachment_create.
message SupportTicketAttachmentCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Support ticket ID to attach the file to.
  int32 ticket_id = 2;
  // Attachment file content or reference accepted by the Linode API.
  string file = 3;
  // Must be true to confirm support ticket attachment creation. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}
