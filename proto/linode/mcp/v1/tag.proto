syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Tag mirrors the Linode tag object. The entity-ID lists are repeated fields,
// emitted as [] when empty (vs the Go struct's omitempty).
message Tag {
  string label = 1;
  repeated int32 domains = 2;
  repeated int32 linodes = 3;
  repeated int32 nodebalancers = 4;
  repeated int32 volumes = 5;
}

// TagWriteResponse is the {message, tag} envelope the linode_tag_create tool
// returns.
message TagWriteResponse {
  string message = 1;
  Tag tag = 2;
}

// TagListResponse is the {count, filter?, tags} envelope the linode_tag_list
// tool returns.
message TagListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Tag tags = 3;
}

// TaggedObject mirrors one resource returned by GET /tags/{tag_label}. The API
// returns a different embedded resource per type (linode, domain, nodebalancer,
// volume, ...), so data is a google.protobuf.Struct that round-trips whatever
// the API embeds.
message TaggedObject {
  string type = 1;
  string label = 2;
  google.protobuf.Struct data = 3;
}

// TaggedObjectListResponse is the {count, filter?, tagged_objects} envelope the
// linode_tag_object_list tool returns. The tool paginates and has no filter
// param, so filter is omitted.
message TaggedObjectListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated TaggedObject tagged_objects = 3;
}

// TagListInput is the input contract for linode_tag_list.
message TagListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// TagCreateInput is the input contract for linode_tag_create. label and
// confirm are required; the resource-ID arrays are optional.
message TagCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The tag label.
  string label = 2;
  // Optional domain IDs to tag.
  repeated int32 domains = 3;
  // Optional Linode IDs to tag.
  repeated int32 linodes = 4;
  // Optional NodeBalancer IDs to tag.
  repeated int32 nodebalancers = 5;
  // Optional volume IDs to tag.
  repeated int32 volumes = 6;
  // Must be true to confirm tag creation. Ignored when dry_run=true.
  bool confirm = 7;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 8;
}

// TagDeleteInput is the input contract for linode_tag_delete, a two-stage
// destroy addressed by tag label (tags have no numeric ID).
message TagDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Tag label to delete.
  string tag_label = 2;
  // Must be true to confirm tag deletion. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// TaggedObjectListInput is the input contract for linode_tag_object_list.
// Pairs with TaggedObjectListResponse.
message TaggedObjectListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Tag label to list objects for.
  string tag_label = 2;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 3;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 4;
}
