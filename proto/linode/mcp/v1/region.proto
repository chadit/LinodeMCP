syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Resolver is the DNS resolver block nested in a Region.
message Resolver {
  string ipv4 = 1;
  string ipv6 = 2;
}

// Region mirrors a Linode region (datacenter). capabilities is repeated (emitted
// as []).
message Region {
  string id = 1;
  string label = 2;
  string country = 3;
  repeated string capabilities = 4;
  string status = 5;
  Resolver resolvers = 6;
  string site_type = 7;
}

// RegionListResponse is the envelope linode_region_list returns: a count, an
// optional echoed filter, and the full proto Region elements.
message RegionListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Region regions = 3;
}

// RegionGetInput is the input contract for linode_region_get.
message RegionGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the region to retrieve, such as us-east (required).
  string region_id = 2;
}

// RegionListInput is the input contract for linode_region_list. Both filters
// are client-side.
message RegionListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Filter regions by country code (e.g., 'us', 'de', 'jp').
  optional string country = 2;
  // Filter regions by capability (e.g., 'Linodes', 'Block Storage', 'GPU
  // Linodes').
  optional string capability = 3;
}

// RegionAvailabilityListInput is the input contract for
// linode_region_availability_list.
message RegionAvailabilityListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
}

// RegionAvailabilityGetInput is the input contract for
// linode_region_availability_get.
message RegionAvailabilityGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Region slug to inspect, for example 'us-east'.
  string region_id = 2;
}

// RegionAvailability mirrors a single compute-type availability entry for a
// region: whether a given plan is available in that region.
message RegionAvailability {
  string region = 1;
  string plan = 2;
  bool available = 3;
}

// RegionAvailabilityListResponse is the linode_region_availability_list envelope:
// count and the full proto RegionAvailability elements. The tool has no filter
// params, so filter is omitted.
message RegionAvailabilityListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated RegionAvailability region_availabilities = 3;
}
