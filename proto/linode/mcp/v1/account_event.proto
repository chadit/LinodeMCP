syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

import "google/protobuf/struct.proto";

// AccountEventEntity is the resource an account event is about. id is a
// passthrough value (the API returns an int or string depending on entity type).
message AccountEventEntity {
  google.protobuf.Value id = 1;
  string label = 2;
  string type = 3;
  string url = 4;
}

// AccountEvent mirrors one account event. duration, percent_complete, rate, and
// time_remaining are nullable (omitted when unset); entity and secondary_entity
// are omitted when unset.
message AccountEvent {
  string action = 1;
  string created = 2;
  optional double duration = 3;
  AccountEventEntity entity = 4;
  int32 id = 5;
  string message = 6;
  optional int32 percent_complete = 7;
  optional string rate = 8;
  AccountEventEntity secondary_entity = 9;
  bool seen = 10;
  string status = 11;
  optional string time_remaining = 12;
  string username = 13;
}

// AccountEventListResponse is the envelope linode_account_event_list returns: a
// count, an optional echoed filter, and the full proto AccountEvent elements.
message AccountEventListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated AccountEvent account_events = 3;
}

// AccountEventGetInput is the input contract for linode_account_event_get.
message AccountEventGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the account event to retrieve (required).
  int32 event_id = 2;
}

// AccountEventListInput is the input contract for linode_account_event_list.
message AccountEventListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// AccountEventSeenInput is the input contract for linode_account_event_seen.
message AccountEventSeenInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Numeric account event ID to mark as seen (required).
  int32 event_id = 2;
  // Must be true to confirm marking the account event as seen. Ignored when
  // dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
}
