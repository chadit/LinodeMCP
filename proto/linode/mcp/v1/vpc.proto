syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Vpc mirrors the Linode Virtual Private Cloud object. Field order and JSON names
// match what both implementations emit today.
message Vpc {
  int32 id = 1;
  string label = 2;
  string description = 3;
  string region = 4;
  repeated VpcSubnet subnets = 5;
  string created = 6;
  string updated = 7;
}

// VpcSubnet is a subnet within a VPC.
message VpcSubnet {
  int32 id = 1;
  string label = 2;
  string ipv4 = 3;
  repeated VpcSubnetLinode linodes = 4;
  string created = 5;
  string updated = 6;
}

// VpcSubnetLinode is a Linode assigned to a VPC subnet.
message VpcSubnetLinode {
  int32 id = 1;
  repeated VpcSubnetLinodeInterface interfaces = 2;
}

// VpcSubnetLinodeInterface is a network interface on a Linode within a subnet.
message VpcSubnetLinodeInterface {
  int32 id = 1;
  bool active = 2;
  int32 config_id = 3;
}

// VpcListResponse is the envelope linode_vpc_list returns: a count, an optional
// echoed filter, and the full proto Vpc elements.
message VpcListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Vpc vpcs = 3;
}

// VpcWriteResponse is the {message, vpc} envelope the VPC write tools (create,
// update) return.
message VpcWriteResponse {
  string message = 1;
  Vpc vpc = 2;
}

// VpcGetInput is the input contract for linode_vpc_get.
message VpcGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC to retrieve (required).
  string vpc_id = 2;
}

// VpcSubnetWriteResponse is the {message, subnet} envelope the VPC subnet write
// tools (create, update) return.
message VpcSubnetWriteResponse {
  string message = 1;
  VpcSubnet subnet = 2;
}

// VpcSubnetListResponse is the envelope linode_vpc_subnet_list returns: a count,
// an optional echoed filter, and the full proto VpcSubnet elements for a VPC.
message VpcSubnetListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated VpcSubnet subnets = 3;
}

// VpcSubnetGetInput is the input contract for linode_vpc_subnet_get.
message VpcSubnetGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC (required).
  string vpc_id = 2;
  // The ID of the subnet to retrieve (required).
  string subnet_id = 3;
}

// VPCIP mirrors one IP address associated with a VPC, from GET /vpcs/ips and
// GET /vpcs/{vpc_id}/ips. The nullable fields (address, address_range,
// linode_id, config_id, gateway, prefix) are optional and omitted when the API
// returns null.
message VPCIP {
  optional string address = 1;
  optional string address_range = 2;
  int32 vpc_id = 3;
  int32 subnet_id = 4;
  string region = 5;
  optional int32 linode_id = 6;
  optional int32 config_id = 7;
  int32 interface_id = 8;
  bool active = 9;
  string nat_1_1 = 10;
  optional string gateway = 11;
  optional int32 prefix = 12;
  string subnet_mask = 13;
}

// VPCIPListResponse is the envelope linode_vpc_ip_all_list and
// linode_vpc_ip_list return: a count, an optional echoed filter, and the full
// proto VPCIP elements. Neither tool filters, so filter is omitted.
message VPCIPListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated VPCIP ips = 3;
}
