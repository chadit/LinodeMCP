syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Vpc mirrors the Linode Virtual Private Cloud object. Field order and JSON names
// match what both implementations emit today.
message Vpc {
  int32 id = 1;
  string label = 2;
  string description = 3;
  string region = 4;
  repeated VpcSubnet subnets = 5;
  string created = 6;
  string updated = 7;
}

// VpcSubnet is a subnet within a VPC.
message VpcSubnet {
  int32 id = 1;
  string label = 2;
  string ipv4 = 3;
  repeated VpcSubnetLinode linodes = 4;
  string created = 5;
  string updated = 6;
}

// VpcSubnetLinode is a Linode assigned to a VPC subnet.
message VpcSubnetLinode {
  int32 id = 1;
  repeated VpcSubnetLinodeInterface interfaces = 2;
}

// VpcSubnetLinodeInterface is a network interface on a Linode within a subnet.
message VpcSubnetLinodeInterface {
  int32 id = 1;
  bool active = 2;
  int32 config_id = 3;
}

// VpcListResponse is the envelope linode_vpc_list returns: a count, an optional
// echoed filter, and the full proto Vpc elements.
message VpcListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Vpc vpcs = 3;
}

// VpcWriteResponse is the {message, vpc} envelope the VPC write tools (create,
// update) return.
message VpcWriteResponse {
  string message = 1;
  Vpc vpc = 2;
}

// VpcDeleteResponse is the id-echo envelope linode_vpc_delete returns: a
// confirmation message plus the deleted VPC's ID. The delete endpoint returns
// an empty body, so the id echo confirms the target.
message VpcDeleteResponse {
  string message = 1;
  int32 vpc_id = 2;
}

// VpcGetInput is the input contract for linode_vpc_get.
message VpcGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC to retrieve (required).
  string vpc_id = 2;
}

// VpcSubnetWriteResponse is the {message, subnet} envelope the VPC subnet write
// tools (create, update) return.
message VpcSubnetWriteResponse {
  string message = 1;
  VpcSubnet subnet = 2;
}

// VpcSubnetListResponse is the envelope linode_vpc_subnet_list returns: a count,
// an optional echoed filter, and the full proto VpcSubnet elements for a VPC.
message VpcSubnetListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated VpcSubnet subnets = 3;
}

// VpcSubnetGetInput is the input contract for linode_vpc_subnet_get.
message VpcSubnetGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC (required).
  string vpc_id = 2;
  // The ID of the subnet to retrieve (required).
  string subnet_id = 3;
}

// VPCIP mirrors one IP address associated with a VPC, from GET /vpcs/ips and
// GET /vpcs/{vpc_id}/ips. The nullable fields (address, address_range,
// linode_id, config_id, gateway, prefix) are optional and omitted when the API
// returns null.
message VPCIP {
  optional string address = 1;
  optional string address_range = 2;
  int32 vpc_id = 3;
  int32 subnet_id = 4;
  string region = 5;
  optional int32 linode_id = 6;
  optional int32 config_id = 7;
  int32 interface_id = 8;
  bool active = 9;
  string nat_1_1 = 10;
  optional string gateway = 11;
  optional int32 prefix = 12;
  string subnet_mask = 13;
}

// VPCIPListResponse is the envelope linode_vpc_ip_all_list and
// linode_vpc_ip_list return: a count, an optional echoed filter, and the full
// proto VPCIP elements. Neither tool filters, so filter is omitted.
message VPCIPListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated VPCIP ips = 3;
}

// VpcSubnetDeleteResponse is the id-echo envelope linode_vpc_subnet_delete
// returns: a confirmation message plus the parent VPC and deleted subnet IDs.
// The delete endpoint returns an empty body, so the echo confirms the target.
message VpcSubnetDeleteResponse {
  string message = 1;
  int32 vpc_id = 2;
  int32 subnet_id = 3;
}

// VpcListInput is the input contract for linode_vpc_list. The list tools take
// vpc_id as a STRING (matching VpcGetInput); the write tools take it as int32.
message VpcListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Filter VPCs by label containing this string (case-insensitive).
  optional string label = 2;
  // Filter VPCs by region (exact match, case-insensitive).
  optional string region = 3;
}

// VpcSubnetCreateItem is one entry in a linode_vpc_create request's subnets
// array: an initial subnet given by its label and IPv4 CIDR range. It carries
// the same fields the create-subnet request body uses (label, ipv4).
message VpcSubnetCreateItem {
  // Label for the subnet.
  string label = 1;
  // IPv4 range for the subnet in CIDR notation (e.g. 10.0.0.0/24).
  string ipv4 = 2;
}

// VpcCreateInput is the input contract for linode_vpc_create. subnets is an
// OPTIONAL array, so it is not required and the named item message preserves
// the advertised {label, ipv4} item shape.
message VpcCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Label for the VPC (1-64 characters).
  string label = 2;
  // Region for the VPC (e.g. us-east). Use linode_region_list to find valid
  // values.
  string region = 3;
  // Description for the VPC (optional).
  optional string description = 4;
  // Initial subnets to create with the VPC, each {label, ipv4} (optional).
  repeated VpcSubnetCreateItem subnets = 5;
  // Must be true to confirm VPC creation. This creates a billable resource.
  // Ignored when dry_run=true.
  bool confirm = 6;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 7;
}

// VpcUpdateInput is the input contract for linode_vpc_update.
message VpcUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC to update.
  int32 vpc_id = 2;
  // New label for the VPC (optional).
  optional string label = 3;
  // New description for the VPC (optional).
  optional string description = 4;
  // Must be true to confirm VPC update. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// VpcDeleteInput is the input contract for linode_vpc_delete.
message VpcDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC to delete.
  int32 vpc_id = 2;
  // Must be true to confirm deletion. This action is irreversible and deletes
  // all subnets. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// VPCIPAllListInput is the input contract for linode_vpc_ip_all_list.
message VPCIPAllListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
}

// VPCIPListInput is the input contract for linode_vpc_ip_list.
message VPCIPListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC.
  string vpc_id = 2;
}

// VpcSubnetListInput is the input contract for linode_vpc_subnet_list.
message VpcSubnetListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC.
  string vpc_id = 2;
}

// VpcSubnetCreateInput is the input contract for linode_vpc_subnet_create.
message VpcSubnetCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC to add the subnet to.
  int32 vpc_id = 2;
  // Label for the subnet.
  string label = 3;
  // IPv4 range for the subnet in CIDR notation (e.g. 10.0.0.0/24).
  string ipv4 = 4;
  // Must be true to confirm subnet creation. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// VpcSubnetUpdateInput is the input contract for linode_vpc_subnet_update.
message VpcSubnetUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC containing the subnet.
  int32 vpc_id = 2;
  // The ID of the subnet to update.
  int32 subnet_id = 3;
  // New label for the subnet.
  string label = 4;
  // Must be true to confirm subnet update. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// VpcSubnetDeleteInput is the input contract for linode_vpc_subnet_delete.
message VpcSubnetDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the VPC containing the subnet.
  int32 vpc_id = 2;
  // The ID of the subnet to delete.
  int32 subnet_id = 3;
  // Must be true to confirm subnet deletion. This action is irreversible.
  // Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 6;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 7;
}
