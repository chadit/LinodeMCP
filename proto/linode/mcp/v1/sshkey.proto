syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// SSHKey mirrors a Linode profile SSH key.
message SSHKey {
  int32 id = 1;
  string label = 2;
  string ssh_key = 3;
  string created = 4;
}

// SSHKeyListResponse is the envelope linode_sshkey_list returns: a count, an
// optional echoed filter, and the full proto SSHKey elements.
message SSHKeyListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated SSHKey ssh_keys = 3;
}

// SSHKeyWriteResponse is the {message, ssh_key} envelope the SSH key create and
// update tools return: a confirmation string plus the full SSHKey element. The
// ssh_key field carries the public key, which is public information and kept in
// full.
message SSHKeyWriteResponse {
  string message = 1;
  SSHKey ssh_key = 2;
}

// SSHKeyGetInput is the input contract for linode_sshkey_get.
message SSHKeyGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the SSH key to retrieve (required).
  int32 ssh_key_id = 2;
}
