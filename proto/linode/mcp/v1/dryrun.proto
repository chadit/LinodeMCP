syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// DryRunRequest captures the HTTP method, path, and optional sanitized body the
// mutating call would have made. body is a google.protobuf.Value so any request
// shape round-trips; it stays absent when the tool has no body to preview.
message DryRunRequest {
  string method = 1;
  string path = 2;
  google.protobuf.Value body = 3;
}

// DryRunDependency is one resource a destructive call would affect. kind names
// the resource type (e.g. "volume", "public_ip"); id is an int or string
// identifier held as a Value (absent for resources without a stable id, which
// carry a label instead); action is one of detached, released, removed,
// cascade_deleted; note is free-form context.
message DryRunDependency {
  string kind = 1;
  google.protobuf.Value id = 2;
  optional string label = 3;
  string action = 4;
  optional string note = 5;
}

// DryRunBillingDelta is a best-effort monthly cost change estimate.
// monthly_change_usd is a signed decimal string (e.g. "-20.00") or "unknown".
message DryRunBillingDelta {
  string monthly_change_usd = 1;
  optional string note = 2;
}

// DryRunResponse is the wire shape a mutating tool returns when invoked with
// dry_run:true. current_state is a google.protobuf.Value so it renders as the
// resource object (protojson sorts its keys on both languages) or as JSON null
// for a create preview with no existing resource. The dependency-walk fields
// (dependencies, side_effects, billing_delta, warnings) carry Phase 2
// enrichment; a tool without a walk leaves them empty.
message DryRunResponse {
  bool dry_run = 1;
  string tool = 2;
  optional string environment = 3;
  DryRunRequest would_execute = 4;
  google.protobuf.Value current_state = 5;
  repeated DryRunDependency dependencies = 6;
  repeated string side_effects = 7;
  DryRunBillingDelta billing_delta = 8;
  repeated string warnings = 9;
}

// PlanResponse is the wire shape a mode:"plan" call returns: a richer dry-run
// that also carries a plan_id, RFC3339 timestamps, and a hash of the current
// state a later mode:"apply" call re-checks for drift. It is a strict superset
// of DryRunResponse, so it reuses the same dependency-walk enrichment fields.
message PlanResponse {
  string plan_id = 1;
  string created_at = 2;
  string expires_at = 3;
  string tool = 4;
  string environment = 5;
  DryRunRequest would_execute = 6;
  google.protobuf.Value current_state = 7;
  string current_state_hash = 8;
  repeated DryRunDependency dependencies = 9;
  repeated string side_effects = 10;
  DryRunBillingDelta billing_delta = 11;
  repeated string warnings = 12;
}
