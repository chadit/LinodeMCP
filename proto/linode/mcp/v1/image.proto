syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Image mirrors the Linode image object. expiry and eol are nullable on the wire
// (omitted when unset); capabilities and tags are repeated (emitted as []).
message Image {
  string id = 1;
  string label = 2;
  string description = 3;
  string type = 4;
  string vendor = 5;
  string status = 6;
  string created = 7;
  string created_by = 8;
  optional string expiry = 9;
  optional string eol = 10;
  repeated string capabilities = 11;
  repeated string tags = 12;
  int32 size = 13;
  bool is_public = 14;
  bool deprecated = 15;
}

// ImageWriteResponse is the {message, image} envelope the image create/update
// tools return.
message ImageWriteResponse {
  string message = 1;
  Image image = 2;
}

// ImageUploadWriteResponse is the {message, upload_to, image} envelope the
// linode_image_upload tool returns. upload_to is the one-time upload URL; image
// is the created custom image element.
message ImageUploadWriteResponse {
  string message = 1;
  string upload_to = 2;
  Image image = 3;
}

// ImageDeleteResponse is the confirmation envelope linode_image_delete returns.
// The delete endpoint returns an empty body and the current handler emits only a
// human-readable message, so this envelope carries just that message.
message ImageDeleteResponse {
  string message = 1;
}

// ImageListResponse is the {count, filter?, images} envelope the
// linode_image_list tool returns.
message ImageListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated Image images = 3;
}

// ImageGetInput is the input contract for linode_image_get.
message ImageGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The image ID to retrieve (required), such as linode/debian11 or private/123.
  string image_id = 2;
}

// ImageListInput is the input contract for linode_image_list. The three
// filters are client-side string filters ("true"/"false" for the booleans),
// matching the hand-built schema which advertises them as strings.
message ImageListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Filter images by type (manual, automatic).
  optional string type = 2;
  // Filter by public status (true, false).
  optional string is_public = 3;
  // Filter by deprecated status (true, false).
  optional string deprecated = 4;
}

// ImageCreateInput is the input contract for linode_image_create. disk_id and
// confirm are required.
message ImageCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode disk to image.
  int32 disk_id = 2;
  // Short label for the new image (optional).
  optional string label = 3;
  // Detailed description for the new image (optional).
  optional string description = 4;
  // Whether the image supports cloud-init (optional).
  optional bool cloud_init = 5;
  // Tag strings to apply to the image (optional).
  repeated string tags = 6;
  // Must be set to true to confirm image creation. Ignored when dry_run=true.
  bool confirm = 7;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 8;
}

// ImageUploadInput is the input contract for linode_image_upload. label,
// region, and confirm are required.
message ImageUploadInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The custom image label.
  string label = 2;
  // The region for the image upload.
  string region = 3;
  // Detailed description for the image (optional).
  optional string description = 4;
  // Whether the image supports cloud-init (optional).
  optional bool cloud_init = 5;
  // Tag strings to apply to the image (optional).
  repeated string tags = 6;
  // Must be set to true to confirm the image upload. Ignored when dry_run=true.
  bool confirm = 7;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 8;
}

// ImageUpdateInput is the input contract for linode_image_update. image_id and
// confirm are required.
message ImageUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The editable image ID, for example private/12345 or shared/123.
  string image_id = 2;
  // New image label (optional).
  optional string label = 3;
  // New image description (optional).
  optional string description = 4;
  // Tag strings to apply to the image (optional).
  repeated string tags = 5;
  // Must be set to true to confirm the image update. Ignored when dry_run=true.
  bool confirm = 6;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 7;
}

// ImageDeleteInput is the input contract for linode_image_delete, a two-stage
// destroy: image_id and confirm are required, mode/plan_id drive plan/apply.
message ImageDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The image ID to delete, for example private/12345.
  string image_id = 2;
  // Must be set to true to confirm deletion. This action is irreversible.
  // Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// ImageReplicateInput is the input contract for linode_image_replicate.
// image_id and confirm are required. regions is required at runtime, but a
// repeated field cannot be marked required in the generated schema, so the
// required flag is dropped (the handler still enforces a non-empty region set).
message ImageReplicateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Image ID to replicate, such as private/123.
  string image_id = 2;
  // Region slug strings to keep or replicate the image to. Required at runtime.
  repeated string regions = 3;
  // Must be set to true to confirm image replication. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}
