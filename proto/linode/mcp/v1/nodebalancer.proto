syntax = "proto3";

package linode.mcp.v1;

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// Transfer is the bandwidth transfer summary attached to several resources.
message Transfer {
  double in = 1;
  double out = 2;
  double total = 3;
}

// NodeBalancer mirrors the Linode NodeBalancer object.
message NodeBalancer {
  int32 id = 1;
  string label = 2;
  string region = 3;
  string hostname = 4;
  string ipv4 = 5;
  string ipv6 = 6;
  int32 client_conn_throttle = 7;
  Transfer transfer = 8;
  repeated string tags = 9;
  string created = 10;
  string updated = 11;
}

// NodeBalancerListResponse mirrors the linode_nodebalancer_list wrapper: a
// count, an optional filter echo, and the NodeBalancers. This is the project's
// own envelope, not the Linode {data,page,pages,results} list shape.
message NodeBalancerListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated NodeBalancer nodebalancers = 3;
}

// NodeBalancerWriteResponse is the {message, nodebalancer} envelope the
// NodeBalancer create/update tools return.
message NodeBalancerWriteResponse {
  string message = 1;
  NodeBalancer nodebalancer = 2;
}

// NodeBalancerDeleteResponse is the id-echo envelope linode_nodebalancer_delete
// returns: a confirmation message plus the deleted NodeBalancer's ID. The
// delete endpoint returns an empty body, so the id echo confirms the target.
message NodeBalancerDeleteResponse {
  string message = 1;
  int32 nodebalancer_id = 2;
}

// NodeBalancerGetInput is the input contract for linode_nodebalancer_get.
message NodeBalancerGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the NodeBalancer to retrieve (required).
  int32 nodebalancer_id = 2;
}

// InstanceNodeBalancerListInput is the input contract for
// linode_instance_nodebalancer_list.
message InstanceNodeBalancerListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
}

// NodeBalancerListInput is the input contract for linode_nodebalancer_list.
message NodeBalancerListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Filter by region ID (e.g., us-east, eu-west).
  optional string region = 2;
  // Filter NodeBalancers by label containing this string (case-insensitive).
  optional string label_contains = 3;
}

// NodeBalancerCreateInput is the input contract for linode_nodebalancer_create.
message NodeBalancerCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Region where the NodeBalancer will be created (e.g., 'us-east').
  string region = 2;
  // A label for the NodeBalancer (optional).
  optional string label = 3;
  // Connections per second throttle limit (0-20). Default is 0 (no throttle).
  optional int32 client_conn_throttle = 4;
  // Must be set to true to confirm creation. This operation incurs billing
  // charges. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
  // Reserved public IPv4 address to assign. When omitted, the API allocates
  // an ephemeral IPv4 address.
  optional string ipv4 = 7;
}

// NodeBalancerUpdateInput is the input contract for linode_nodebalancer_update.
message NodeBalancerUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the NodeBalancer to update.
  int32 nodebalancer_id = 2;
  // New label for the NodeBalancer (optional).
  optional string label = 3;
  // New connections per second throttle limit (0-20) (optional).
  optional int32 client_conn_throttle = 4;
  // Must be set to true to confirm NodeBalancer update. Ignored when
  // dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// NodeBalancerDeleteInput is the input contract for linode_nodebalancer_delete.
message NodeBalancerDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the NodeBalancer to delete.
  int32 nodebalancer_id = 2;
  // Must be set to true to confirm deletion. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// NodeBalancerFirewallListInput is the input contract for
// linode_nodebalancer_firewall_list.
message NodeBalancerFirewallListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the NodeBalancer whose Cloud Firewalls should be listed.
  int32 nodebalancer_id = 2;
  // Page number to retrieve.
  optional int32 page = 3;
  // Number of results per page, from 25 through 500.
  optional int32 page_size = 4;
}

// NodeBalancerFirewallUpdateInput is the input contract for
// linode_nodebalancer_firewall_update. firewall_ids is a required array in the
// hand-built schema; a repeated field cannot land in the generated required
// set, so it drops to optional there while the handler still enforces presence.
message NodeBalancerFirewallUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the NodeBalancer whose Cloud Firewall assignments should be
  // replaced.
  int32 nodebalancer_id = 2;
  // Complete list of firewall IDs to assign to the NodeBalancer. Use an empty
  // list to remove all firewall assignments.
  repeated int32 firewall_ids = 3;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 4;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 5;
  // Must be set to true to confirm firewall assignment changes. Ignored when
  // dry_run=true.
  bool confirm = 6;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 7;
}
