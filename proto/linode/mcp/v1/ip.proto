syntax = "proto3";

package linode.mcp.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/chadit/LinodeMCP/go/internal/genpb/linode/mcp/v1;linodev1";

// InstanceIPType is the address family requested by the IP allocate tools
// (linode_instance_ip_allocate and linode_networking_ip_allocate). Values are
// the exact lowercase Linode API strings authored from the live OpenAPI spec.
// See the enum-wrapper convention in nodebalancer_config.proto. Only the
// allocate INPUT type is this enum; the IPAddress.type read field stays a plain
// string because the API returns richer values there (ipv4/public, ipv6/range,
// and so on).
message InstanceIPType {
  enum Value {
    unspecified = 0;
    // The allocate endpoints (POST .../ips, POST /networking/ips) accept only
    // ipv4; ipv6 is assigned via ranges, not allocation. The old code accepted
    // ipv6 here (rejected downstream by the API); the sync-enums gate caught it.
    ipv4 = 1;
  }
}

// IPAddress mirrors a Linode networking IP address. vpc_nat_1_1 is nullable
// (omitted when unset).
message IPAddress {
  string address = 1;
  string gateway = 2;
  string subnet_mask = 3;
  int32 prefix = 4;
  string type = 5;
  bool public = 6;
  string rdns = 7;
  int32 linode_id = 8;
  string region = 9;
  optional string vpc_nat_1_1 = 10;
}

// IPAddressWriteResponse is the {message, ip} envelope the networking IP update
// and allocate tools return.
message IPAddressWriteResponse {
  string message = 1;
  IPAddress ip = 2;
}

// IPAssignment is one address-to-Linode binding in an IP assign request: the IP
// address and the Linode that receives it.
message IPAssignment {
  string address = 1;
  int32 linode_id = 2;
}

// NetworkingIPShareWriteResponse is the {message, linode_id, ips} echo the IP
// share tools return. The share endpoint returns an opaque body, so the echo
// reports the primary Linode and the shared address list from the request.
message NetworkingIPShareWriteResponse {
  string message = 1;
  int32 linode_id = 2;
  repeated string ips = 3;
}

// NetworkingIPAssignWriteResponse is the {message, region, assignments} echo the
// IP assign tools return. The assign endpoint returns an opaque body, so the
// echo reports the region and the assignment list from the request.
message NetworkingIPAssignWriteResponse {
  string message = 1;
  string region = 2;
  repeated IPAssignment assignments = 3;
}

// NetworkingIPListResponse is the linode_networking_ip_list envelope: count and
// the full proto IPAddress elements. The tool has no page/page_size or filter
// param (only skip_ipv6_rdns), so filter is omitted.
message NetworkingIPListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated IPAddress ips = 3;
}

// IPv6Pool mirrors an IPv6 pool on the account: a CIDR range, its region, and
// the prefix length.
message IPv6Pool {
  string range = 1;
  string region = 2;
  int32 prefix = 3;
}

// IPv6PoolListResponse is the linode_ipv6_pool_list envelope: count and the full
// proto IPv6Pool elements. The tool paginates and has no filter param, so filter
// is omitted.
message IPv6PoolListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated IPv6Pool ipv6_pools = 3;
}

// IPv6Range mirrors an IPv6 range on the account. The list element carries
// range, region, prefix, and the route target it forwards to; the single-range
// detail GET drops route_target and instead reports is_bgp and the Linode IDs
// the range is bound to. The two shapes share this one message: route_target is
// implicit-presence so it serializes as "" on the detail GET, is_bgp is optional
// so a genuine false still serializes, and linodes is repeated so the list
// element emits it as [].
message IPv6Range {
  string range = 1;
  string region = 2;
  int32 prefix = 3;
  string route_target = 4;
  optional bool is_bgp = 5;
  repeated int32 linodes = 6;
}

// IPv6RangeListResponse is the linode_ipv6_range_list envelope: count and the
// full proto IPv6Range elements. The tool paginates and has no filter param, so
// filter is omitted.
message IPv6RangeListResponse {
  int32 count = 1;
  optional string filter = 2;
  repeated IPv6Range ipv6_ranges = 3;
}

// IPv6RangeWriteResponse is the {message, range} envelope the
// linode_ipv6_range_create tool returns: a confirmation string plus the full
// IPv6Range element the API returned.
message IPv6RangeWriteResponse {
  string message = 1;
  IPv6Range range = 2;
}

// IPv6RangeDeleteResponse is the confirmation envelope linode_ipv6_range_delete
// returns: a message plus the deleted range. The delete endpoint returns an
// empty body, so the response echoes the range CIDR.
message IPv6RangeDeleteResponse {
  string message = 1;
  string range = 2;
}

// ReservedIPAssignedEntity identifies the resource currently using a reserved
// address. The API returns null when the address is unassigned; the Python
// handler restores that explicit null after proto serialization.
message ReservedIPAssignedEntity {
  int64 id = 1;
  string label = 2;
  string type = 3;
  string url = 4;
}

// ReservedIPVPCNAT describes a 1:1 VPC NAT association. The API returns null
// when no association exists; the Python handler restores that explicit null
// after proto serialization.
message ReservedIPVPCNAT {
  string address = 1;
  int64 subnet_id = 2;
  int64 vpc_id = 3;
}

// ReservedIPAddress mirrors the complete reserved public IPv4 response.
// Nullable scalars use proto presence and typed relationship messages preserve
// integer IDs; the handler restores documented explicit nulls in field order.
message ReservedIPAddress {
  string address = 1;
  ReservedIPAssignedEntity assigned_entity = 2;
  optional string gateway = 3;
  optional int64 interface_id = 4;
  optional int64 linode_id = 5;
  int32 prefix = 6;
  bool public = 7;
  optional string rdns = 8;
  string region = 9;
  bool reserved = 10;
  string subnet_mask = 11;
  repeated string tags = 12;
  string type = 13;
  ReservedIPVPCNAT vpc_nat_1_1 = 14;
}

// ReservedIPListResponse is the project list envelope for the paginated
// reserved-IP collection.
message ReservedIPListResponse {
  int32 count = 1;
  repeated ReservedIPAddress reserved_ips = 2;
}

// ReservedIPPrice preserves nullable hourly/monthly values from the pricing
// response rather than imposing defaults on a billing value the API omitted.
message ReservedIPPrice {
  google.protobuf.Value hourly = 1;
  google.protobuf.Value monthly = 2;
}

// ReservedIPRegionPrice is a regional price override.
message ReservedIPRegionPrice {
  string id = 1;
  google.protobuf.Value hourly = 2;
  google.protobuf.Value monthly = 3;
}

// ReservedIPType is one reserved-IP pricing type returned by the API.
message ReservedIPType {
  string id = 1;
  string label = 2;
  ReservedIPPrice price = 3;
  repeated ReservedIPRegionPrice region_prices = 4;
  int64 transfer = 5;
}

// ReservedIPTypeListResponse is the project list envelope for pricing types.
message ReservedIPTypeListResponse {
  int32 count = 1;
  repeated ReservedIPType reserved_ip_types = 2;
}

// ReservedIPDeleteResponse confirms an empty successful unreserve response.
message ReservedIPDeleteResponse {
  string message = 1;
  string address = 2;
}

// ReservedIPCreateInput is the input contract for
// linode_networking_reserved_ip_create.
message ReservedIPCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Region in which to reserve the public IPv4 address.
  string region = 2;
  // Existing tags to apply to the reserved address.
  repeated string tags = 3;
  // Must be true to confirm reservation and billing. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it. Default false.
  optional bool dry_run = 5;
}

// ReservedIPListInput is the input contract for
// linode_networking_reserved_ip_list.
message ReservedIPListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// ReservedIPGetInput is the input contract for
// linode_networking_reserved_ip_get.
message ReservedIPGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Reserved public IPv4 address to retrieve.
  string address = 2;
}

// ReservedIPUpdateInput is the input contract for
// linode_networking_reserved_ip_update. tags is required by the handler;
// repeated proto fields cannot appear in generated required arrays.
message ReservedIPUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Reserved public IPv4 address whose tags will be replaced.
  string address = 2;
  // Complete replacement set of existing tags. An empty list removes all tags.
  repeated string tags = 3;
  // Must be true to confirm replacing tags. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it. Default false.
  optional bool dry_run = 5;
}

// ReservedIPTypeListInput is the input contract for
// linode_networking_reserved_ip_type_list.
message ReservedIPTypeListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
}

// ReservedIPDeleteInput is the input contract for
// linode_networking_reserved_ip_delete.
message ReservedIPDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Reserved public IPv4 address to unreserve permanently.
  string address = 2;
  // Must be true to confirm unreserving the address. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by mode:"plan", supplied with mode:"apply".
  optional string plan_id = 6;
}

// IPv6PoolListInput is the input contract for linode_ipv6_pool_list.
message IPv6PoolListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// IPv6RangeListInput is the input contract for linode_ipv6_range_list.
message IPv6RangeListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Page of results to return (optional, minimum 1).
  optional int32 page = 2;
  // Number of results per page (optional, 25-500).
  optional int32 page_size = 3;
}

// IPv6RangeGetInput is the input contract for linode_ipv6_range_get.
message IPv6RangeGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // IPv6 range prefix, for example 2001:0db8::/64.
  string range = 2;
}

// IPv6RangeCreateInput is the input contract for linode_ipv6_range_create.
message IPv6RangeCreateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The IPv6 prefix length for the created range.
  int32 prefix_length = 2;
  // Optional Linode ID to assign the new range to.
  optional int32 linode_id = 3;
  // Optional route target for the new IPv6 range.
  optional string route_target = 4;
  // Must be true to confirm IPv6 range creation. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// IPv6RangeDeleteInput is the input contract for linode_ipv6_range_delete.
message IPv6RangeDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // IPv6 range prefix, for example 2001:0db8::/64.
  string range = 2;
  // Must be true to confirm IPv6 range deletion. Ignored when dry_run=true.
  bool confirm = 3;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 4;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with plan_id
  // re-checks drift and executes. Omit for a single-step call.
  optional string mode = 5;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 6;
}

// InstanceIPDeleteResponse is the id-echo envelope linode_instance_ip_delete
// returns: a confirmation message plus the parent instance ID and the removed
// address. The delete endpoint returns an empty body, so the echo confirms the
// target.
message InstanceIPDeleteResponse {
  string message = 1;
  int32 linode_id = 2;
  string address = 3;
}

// IPv6SLAAC mirrors a Linode instance's SLAAC or link-local IPv6 address.
message IPv6SLAAC {
  string address = 1;
  string gateway = 2;
  string subnet_mask = 3;
  int32 prefix = 4;
  string type = 5;
  string rdns = 6;
  string region = 7;
}

// InstanceIPv4 holds the IPv4 address categories for a Linode instance: the
// public, private, shared, and reserved address lists.
message InstanceIPv4 {
  repeated IPAddress public = 1;
  repeated IPAddress private = 2;
  repeated IPAddress shared = 3;
  repeated IPAddress reserved = 4;
}

// InstanceIPv6 holds a Linode instance's IPv6 addresses: the SLAAC and
// link-local addresses (nullable, omitted when unset) plus the global, range,
// and pool lists. ranges and pools are omitted by the API when empty.
message InstanceIPv6 {
  IPv6SLAAC slaac = 1;
  IPv6SLAAC link_local = 2;
  repeated IPv6Range global = 3;
  repeated IPv6Range ranges = 4;
  repeated IPv6Range pools = 5;
}

// InstanceIPsResponse is the linode_instance_ip_list response: the full IPv4 and
// IPv6 address configuration for one Linode instance. The endpoint returns a
// nested object (not a {count, key} list envelope), so this models the whole
// structure rather than a flat repeated field. ipv4 and ipv6 are nullable
// (omitted when the API does not return them).
message InstanceIPsResponse {
  InstanceIPv4 ipv4 = 1;
  InstanceIPv6 ipv6 = 2;
}

// IPAddressGetInput is the input contract for linode_networking_ip_get.
message IPAddressGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The IP address to retrieve (required).
  string address = 2;
}

// InstanceIPGetInput is the input contract for linode_instance_ip_get (returns a
// shared IPAddress).
message InstanceIPGetInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The IP address to retrieve (required).
  string address = 3;
}

// InstanceIPListInput is the input contract for linode_instance_ip_list.
message InstanceIPListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
}

// InstanceIPAllocateInput is the input contract for
// linode_instance_ip_allocate. linode_id, type, public, and confirm are all
// required (public is a required boolean in the hand-built schema, so it stays
// non-optional here).
message InstanceIPAllocateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The type of IP address to allocate: ipv4 or ipv6.
  InstanceIPType.Value type = 3;
  // Whether the IP address should be public (true) or private (false).
  bool public = 4;
  // Must be true to confirm IP allocation. Additional IPs may incur charges.
  // Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// InstanceIPUpdateInput is the input contract for linode_instance_ip_update.
// linode_id, address, rdns, and confirm are required.
message InstanceIPUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The IP address to update (e.g. 203.0.113.1).
  string address = 3;
  // The reverse DNS hostname to assign to the IP address.
  string rdns = 4;
  // Must be true to confirm the RDNS update. Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// InstanceIPDeleteInput is the input contract for linode_instance_ip_delete,
// a two-stage destroy: linode_id, address, and confirm are required, and
// mode/plan_id drive the plan/apply flow.
message InstanceIPDeleteInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode instance (required).
  int32 linode_id = 2;
  // The IP address to remove (e.g. 203.0.113.1).
  string address = 3;
  // Must be true to confirm IP removal. This action is irreversible. Ignored
  // when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
  // Two-stage flow: "plan" previews and returns a plan_id; "apply" with
  // plan_id re-checks drift and executes. Omit for a single-step call.
  optional string mode = 6;
  // The plan_id returned by a mode:"plan" call, supplied with mode:"apply" to
  // execute it.
  optional string plan_id = 7;
}

// NetworkingIPListInput is the input contract for linode_networking_ip_list.
message NetworkingIPListInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // Skip IPv6 reverse DNS lookups (optional).
  optional bool skip_ipv6_rdns = 2;
}

// IPAddressUpdateInput is the input contract for linode_networking_ip_update.
message IPAddressUpdateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The IPv4 or IPv6 address to update.
  string address = 2;
  // The reverse DNS value to set.
  string rdns = 3;
  // Must be true to confirm changing reverse DNS. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// IPAddressAllocateInput is the input contract for
// linode_networking_ip_allocate. public is a required boolean beyond confirm,
// so it stays a plain (non-optional) bool.
message IPAddressAllocateInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the Linode that receives the new IP address.
  int32 linode_id = 2;
  // The type of IP address to allocate: ipv4 or ipv6.
  InstanceIPType.Value type = 3;
  // Whether the IP address should be public.
  bool public = 4;
  // Must be true to confirm IP allocation. Additional IPs may incur charges.
  // Ignored when dry_run=true.
  bool confirm = 5;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 6;
}

// NetworkingIPAssignmentItem is one address-to-Linode binding submitted by the
// IP assign tools: the IP address and the Linode that should receive it. It
// mirrors the linode.IPAssignment request struct (address, linode_id), so the
// generated array item preserves the object shape rather than regressing to a
// bare Struct.
message NetworkingIPAssignmentItem {
  // The IP address to assign.
  string address = 1;
  // The ID of the Linode that receives the address.
  int32 linode_id = 2;
}

// NetworkingIPAssignInput is the input contract for linode_networking_ip_assign.
// assignments is required at the handler level, but a repeated message field
// can never land in the generated required array, so the advertised required
// set is [confirm, region] (see the required-flag-loss log).
message NetworkingIPAssignInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The region for the IP assignments.
  string region = 2;
  // Assignment objects, each with an address and the Linode that receives it.
  repeated NetworkingIPAssignmentItem assignments = 3;
  // Must be true to confirm IP reassignment. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// NetworkingIPv4AssignInput is the input contract for
// linode_networking_ipv4_assign. Same shape as NetworkingIPAssignInput, reusing
// the shared NetworkingIPAssignmentItem; assignments is required at the handler
// level but drops from the generated required set (see the loss log).
message NetworkingIPv4AssignInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The region for the IPv4 assignments.
  string region = 2;
  // Assignment objects, each with an address and the Linode that receives it.
  repeated NetworkingIPAssignmentItem assignments = 3;
  // Must be true to confirm IPv4 reassignment. Ignored when dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// NetworkingIPShareInput is the input contract for linode_networking_ip_share.
// ips is required at the handler level, but a repeated field can never land in
// the generated required array, so the advertised required set is
// [confirm, linode_id] (see the required-flag-loss log).
message NetworkingIPShareInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the primary Linode that receives the shared IP addresses.
  int32 linode_id = 2;
  // IP addresses or IPv6 ranges to share. Use [] to remove all shared IP
  // addresses.
  repeated string ips = 3;
  // Must be true to confirm changing shared IP assignments. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}

// NetworkingIPv4ShareInput is the input contract for
// linode_networking_ipv4_share. Same shape as NetworkingIPShareInput; ips is
// required at the handler level but drops from the generated required set (see
// the loss log).
message NetworkingIPv4ShareInput {
  // Linode environment to use (optional, defaults to "default").
  optional string environment = 1;
  // The ID of the primary Linode that receives the shared IP addresses.
  int32 linode_id = 2;
  // IP addresses or IPv6 ranges to share. Use [] to remove all shared IP
  // addresses.
  repeated string ips = 3;
  // Must be true to confirm changing shared IP assignments. Ignored when
  // dry_run=true.
  bool confirm = 4;
  // Preview the call without making it: returns the would-be request and
  // current resource state. Default false.
  optional bool dry_run = 5;
}
