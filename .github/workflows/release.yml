name: Release

# Manual-only release workflow. Pick a bump type (or enter an explicit
# tag, the path for pre-releases like v0.2.0-rc1 and for promoting an
# rc to stable), the workflow computes or validates the tag, generates
# a grouped changelog from commits, pushes the tag, and creates the
# GitHub release as a DRAFT. The artifacts job then calls
# release-artifacts.yml to verify, build, and attach binaries,
# checksums, SBOMs, and the Python wheel/sdist; the maintainer reviews
# the draft and publishes it. The call edge exists because tags pushed
# with GITHUB_TOKEN never fire push-event workflows.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      tag:
        description: "Explicit tag (e.g. v0.2.0-rc1). Overrides the bump; required for pre-releases and rc promotion."
        required: false
        type: string
      dryRun:
        description: "Dry run (validates and previews notes; skips tag/release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history needed for git describe and changelog generation.
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        env:
          EXPLICIT_TAG: ${{ inputs.tag }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          # previous = last STABLE tag (pre-releases excluded), so the
          # changelog and the bump base always span from the last real
          # release. Without --exclude, cutting v0.2.0 after v0.2.0-rc1
          # would base the changelog on the rc and show almost nothing.
          previous=$(git describe --tags --abbrev=0 --exclude='*-*' 2>/dev/null || echo "")
          # latest_any includes pre-releases, used only to detect that
          # we are mid-rc-cycle and force the explicit-tag path.
          latest_any=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -n "${EXPLICIT_TAG}" ]]; then
            # Explicit path: pre-releases (v0.2.0-rc1, rc2, ...) and
            # promoting an rc to its stable version. Bump is ignored.
            if [[ ! "${EXPLICIT_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
              echo "::error::Tag '${EXPLICIT_TAG}' is not vX.Y.Z or vX.Y.Z-suffix."
              exit 1
            fi
            next="${EXPLICIT_TAG}"
            mode="explicit tag"
          else
            if [[ -n "${latest_any}" && "${latest_any}" == *-* ]]; then
              echo "::error::Latest tag ${latest_any} is a pre-release; use the explicit tag input to cut the next rc or promote it to stable."
              exit 1
            fi
            base="${previous:-v0.0.0}"
            major=$(echo "${base#v}" | cut -d. -f1)
            minor=$(echo "${base#v}" | cut -d. -f2)
            patch=$(echo "${base#v}" | cut -d. -f3)
            case "${BUMP}" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            next="v${major}.${minor}.${patch}"
            mode="${BUMP} bump"
          fi

          # Pre-flight: refuse to clobber an existing tag. This catches
          # double-runs (workflow triggered twice for the same bump) and
          # collisions with manually-pushed tags.
          if git rev-parse --verify "refs/tags/${next}" >/dev/null 2>&1; then
            echo "::error::Tag ${next} already exists. Bump again or delete the existing tag."
            exit 1
          fi

          {
            echo "tag=${next}"
            echo "previous=${previous}"
          } >> "${GITHUB_OUTPUT}"
          echo "Previous: ${previous:-<none>} -> Next: ${next} (${mode})"

          {
            echo "## Version"
            echo ""
            echo "- **Latest tag:** \`${previous:-<none>}\`"
            echo "- **Next tag:** \`${next}\` (${mode})"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Generate release notes
        id: notes
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PREVIOUS_TAG}" ]]; then
            # First release: walk the full commit history.
            body=$(.github/scripts/generate-release-notes.sh)
          else
            body=$(.github/scripts/generate-release-notes.sh "${PREVIOUS_TAG}")
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "${body}"
            echo "RELEASE_NOTES_EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Dry-run preview
        if: ${{ inputs.dryRun }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BODY: ${{ steps.notes.outputs.body }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Dry run: no tag pushed, no release created"
            echo ""
            echo "**Would tag:** \`${TAG}\`, \`go/${TAG}\`, \`python/${TAG}\` (same commit)"
            echo ""
            echo "**Would publish release body:**"
            echo ""
            echo '```markdown'
            echo "${BODY}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "DRY RUN: would tag ${TAG}"
          echo "----- release body -----"
          echo "${BODY}"
          echo "------------------------"

      - name: Create tags
        if: ${{ !inputs.dryRun }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # One release, one version, a tag per supported language at the
          # same commit. The umbrella vX.Y.Z carries the GitHub release and
          # is the only tag matching the artifacts workflow's v*.*.* push
          # trigger. go/vX.Y.Z is what `go install` resolves (Go requires
          # the subdirectory prefix for a module rooted in go/).
          # python/vX.Y.Z is the matching Python tag.
          for t in "${TAG}" "go/${TAG}" "python/${TAG}"; do
            git tag -a "${t}" -m "Release ${TAG}"
          done
          git push origin "${TAG}" "go/${TAG}" "python/${TAG}"

      - name: Create GitHub release
        if: ${{ !inputs.dryRun }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          # The maintainer reviews the generated notes and the attached
          # artifacts, then publishes. Users never see an asset-less
          # release.
          draft: true
          # An rc tag is a pre-release by definition; release-artifacts
          # applies the same dash rule on the manual-tag path.
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

  artifacts:
    name: Artifacts
    needs: release
    if: ${{ !inputs.dryRun }}
    # Caller permissions cap everything the called workflow's jobs may
    # request: release uploads (contents), GHCR push (packages),
    # keyless signing + SLSA (id-token), generator introspection
    # (actions: read).
    permissions:
      contents: write
      packages: write
      id-token: write
      actions: read
    uses: ./.github/workflows/release-artifacts.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
