name: Release

# Manual-only release workflow. Pick a bump type, the workflow computes
# the next semver tag, generates a grouped changelog from commits, pushes
# the tag, and creates the GitHub release.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dryRun:
        description: "Dry run (validates and previews notes; skips tag/release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed for git describe and changelog generation.
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          previous=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "${previous}" ]]; then
            base="v0.0.0"
          else
            base="${previous}"
          fi
          major=$(echo "${base#v}" | cut -d. -f1)
          minor=$(echo "${base#v}" | cut -d. -f2)
          patch=$(echo "${base#v}" | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"

          # Pre-flight: refuse to clobber an existing tag. This catches
          # double-runs (workflow triggered twice for the same bump) and
          # collisions with manually-pushed tags.
          if git rev-parse --verify "refs/tags/${next}" >/dev/null 2>&1; then
            echo "::error::Tag ${next} already exists. Bump again or delete the existing tag."
            exit 1
          fi

          {
            echo "tag=${next}"
            echo "previous=${previous}"
          } >> "${GITHUB_OUTPUT}"
          echo "Previous: ${previous:-<none>} -> Next: ${next} (${{ inputs.bump }} bump)"

          {
            echo "## Version"
            echo ""
            echo "- **Latest tag:** \`${previous:-<none>}\`"
            echo "- **Next tag:** \`${next}\` (${{ inputs.bump }} bump)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Generate release notes
        id: notes
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PREVIOUS_TAG}" ]]; then
            # First release: walk the full commit history.
            body=$(.github/scripts/generate-release-notes.sh)
          else
            body=$(.github/scripts/generate-release-notes.sh "${PREVIOUS_TAG}")
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "${body}"
            echo "RELEASE_NOTES_EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Dry-run preview
        if: ${{ inputs.dryRun }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BODY: ${{ steps.notes.outputs.body }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Dry run: no tag pushed, no release created"
            echo ""
            echo "**Would tag:** \`${TAG}\`"
            echo ""
            echo "**Would publish release body:**"
            echo ""
            echo '```markdown'
            echo "${BODY}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "DRY RUN: would tag ${TAG}"
          echo "----- release body -----"
          echo "${BODY}"
          echo "------------------------"

      - name: Create tag
        if: ${{ !inputs.dryRun }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ !inputs.dryRun }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
