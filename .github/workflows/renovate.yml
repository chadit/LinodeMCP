name: Renovate

# Self-hosted Renovate runner. Runs on a weekly schedule against this repo.
#
# Required secret (Settings -> Secrets and variables -> Actions):
#   RENOVATE_TOKEN  PAT created at https://github.com/settings/tokens
#                   Scopes: repo, workflow
#                   Used for cloning, branch push, PR open/comment, and
#                   public release-metadata lookups (Go releases, action
#                   tags, PyPI versions). One token suffices because the
#                   repo and metadata are both on github.com.
#
# A PAT (rather than the built-in GITHUB_TOKEN) is required so PRs that
# Renovate opens trigger CI workflows. PRs authored via GITHUB_TOKEN do
# not fire other workflows by design.

on:
  schedule:
    # Mondays 04:00 UTC. Adjust if you want a different cadence.
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        type: choice
        default: info
        options: [info, debug]
      dryRun:
        description: "Dry run mode (no PRs created)"
        type: choice
        default: "disabled"
        options: [disabled, extract, lookup, full]

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secret
        id: secrets
        env:
          # GitHub masks secret values inside if-conditions, but a boolean
          # comparison done in env (`secret != ''`) yields a plain
          # 'true'/'false' string we can branch on without leaking anything.
          HAS_RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          skip=false
          if [[ "${HAS_RENOVATE_TOKEN}" != "true" ]]; then
            echo "::warning title=Renovate skipped::RENOVATE_TOKEN secret is not configured. Add it under Settings -> Secrets and variables -> Actions to enable scheduled dependency updates."
            skip=true
          fi
          echo "skip=${skip}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        if: steps.secrets.outputs.skip != 'true'

      # renovatebot/github-action does not publish moving major-version
      # tags. Use a concrete release; Renovate's github-actions manager
      # will auto-bump this on its scheduled run. See action README:
      # "We recommend you pin the version of Renovate to a full version
      # or a full checksum."
      - uses: renovatebot/github-action@v46.1.14
        if: steps.secrets.outputs.skip != 'true'
        with:
          configurationFile: renovate.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun == 'disabled' && 'null' || inputs.dryRun }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}

      # If the run above fails we want it to be loud, not silent for weeks.
      # Open a tracking issue on first failure; comment on it for repeat
      # failures so we don't spam the issue list.
      - name: Open issue on failure
        if: failure() && steps.secrets.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          label="renovate-failure"
          gh label create "$label" \
            --color B60205 \
            --description "Renovate workflow failed; needs attention" \
            >/dev/null 2>&1 || true
          existing=$(gh issue list \
            --label "$label" \
            --state open \
            --json number \
            -q '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "Another failed run: ${RUN_URL}"
          else
            body_file=$(mktemp)
            {
              echo "The scheduled Renovate run failed. Latest run: ${RUN_URL}"
              echo
              echo "This issue is auto-opened by the workflow so a broken"
              echo "Renovate doesn't go unnoticed. Close once the underlying"
              echo "problem is fixed; the next failure will reopen tracking."
            } > "$body_file"
            gh issue create \
              --title "Renovate workflow is failing" \
              --label "$label" \
              --body-file "$body_file"
            rm -f "$body_file"
          fi
