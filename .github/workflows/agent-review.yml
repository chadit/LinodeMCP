name: Agent Code Review

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    review:
        # The review agent is intentionally limited to Chad's same-repo PRs. Fork
        # PRs and other authors skip this job so ZAI_API_KEY is not exposed to
        # untrusted code.
        if: >-
            github.event.pull_request.user.login == 'chadit' &&
            github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Check required secret
              id: secrets
              env:
                  # GitHub masks secret values inside if-conditions, but a boolean
                  # comparison done in env (`secret != ''`) yields a plain
                  # 'true'/'false' string we can branch on without leaking anything.
                  HAS_ZAI_API_KEY: ${{ secrets.ZAI_API_KEY != '' }}
              shell: bash
              run: |
                  set -euo pipefail
                  skip=false
                  if [[ "${HAS_ZAI_API_KEY}" != "true" ]]; then
                    echo "::warning title=Agent review skipped::ZAI_API_KEY secret is not configured. Add it under Settings -> Secrets and variables -> Actions to enable AI code review."
                    skip=true
                  fi
                  echo "skip=${skip}" >> "${GITHUB_OUTPUT}"

            - name: Checkout codebase
              if: steps.secrets.outputs.skip != 'true'
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

            - name: Prepare review input
              if: steps.secrets.outputs.skip != 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  GH_REPO: ${{ github.repository }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p agent-review/chunks
                  gh pr view "${PR_NUMBER}" --repo "${GH_REPO}" \
                    --json number,title,baseRefName,headRefName,headRefOid,author,changedFiles,additions,deletions,files \
                    > agent-review/pr-context.json
                  # Net merge-base diff, not --patch: a per-commit patch series repeats
                  # files touched by several commits (PR #735: 68.6k chars vs 46.2k net),
                  # asks the model to review intermediate states, and skews the
                  # added-line map used for comment target validation.
                  gh pr diff "${PR_NUMBER}" --repo "${GH_REPO}" > agent-review/pr.diff

                  python3 <<'PY'
                  import json
                  import pathlib

                  root = pathlib.Path('agent-review')
                  diff_path = root / 'pr.diff'
                  context_path = root / 'pr-context.json'
                  chunks_dir = root / 'chunks'
                  chunks_dir.mkdir(parents=True, exist_ok=True)

                  context = json.loads(context_path.read_text())
                  compact_context = {
                      key: context.get(key)
                      for key in [
                          'number',
                          'title',
                          'baseRefName',
                          'headRefName',
                          'headRefOid',
                          'changedFiles',
                          'additions',
                          'deletions',
                      ]
                  }
                  compact_context['files'] = [
                      {
                          'path': item.get('path'),
                          'additions': item.get('additions'),
                          'deletions': item.get('deletions'),
                          'changeType': item.get('changeType'),
                      }
                      for item in context.get('files', [])
                  ]

                  header = '''
                  You are a Senior Staff Backend Engineer conducting a strict PR review.
                  Review only the provided PR metadata and unified diff chunk. Do not use tools. Do not invent findings.
                  The diff chunk contains only files changed by this PR. Do not comment on unchanged files or lines.
                  Return ONLY raw JSON. No markdown fences. No prose before or after JSON.

                  The JSON object must have exactly these keys:
                  - event: "COMMENT" or "REQUEST_CHANGES"
                  - body: string
                  - comments: array of objects with path, line, body

                  Rules:
                  - Use event "REQUEST_CHANGES" only for blocking correctness, security, data-loss, broken API contract, broken tests, or missing required tests for changed behavior.
                  - Use event "COMMENT" for non-blocking findings, weak confidence, style, maintainability, or no findings.
                  - Every comment must target only an added/modified RIGHT-side line present in this unified diff chunk.
                  - If there are no line-specific findings in this chunk, return comments: [] and explain in body.
                  - Focus on correctness, concurrency, route/API contract, error handling, tests, and security.
                  - Avoid style-only comments unless they indicate a real maintenance risk.

                  PR metadata JSON follows:
                  '''.strip() + '\n'

                  files = []
                  current = []
                  for line in diff_path.read_text(errors='replace').splitlines(keepends=True):
                      if line.startswith('diff --git ') and current:
                          files.append(''.join(current))
                          current = [line]
                      else:
                          current.append(line)
                  if current:
                      files.append(''.join(current))

                  # Caps per-call generation time, not context size. A single 68k-char
                  # chunk at PR #735's size pushed GLM past what the endpoint tolerates
                  # on one connection and every attempt died mid-response. 45k keeps
                  # each prompt near the size that reliably completes.
                  max_chars = 45000
                  chunks = []
                  current_chunk = []
                  current_size = 0
                  for file_diff in files:
                      if current_chunk and current_size + len(file_diff) > max_chars:
                          chunks.append(''.join(current_chunk))
                          current_chunk = []
                          current_size = 0
                      if len(file_diff) > max_chars:
                          # Keep review scoped to the changed file, but split very large file diffs
                          # at hunk boundaries so the prompt payload never becomes oversized.
                          prefix = []
                          active = []
                          parts = []
                          for line in file_diff.splitlines(keepends=True):
                              if line.startswith('diff --git ') or line.startswith('index ') or line.startswith('--- ') or line.startswith('+++ '):
                                  prefix.append(line)
                              elif line.startswith('@@') and active:
                                  parts.append(''.join(prefix + active))
                                  active = [line]
                              else:
                                  active.append(line)
                          if active:
                              parts.append(''.join(prefix + active))
                          for part in parts:
                              if current_chunk and current_size + len(part) > max_chars:
                                  chunks.append(''.join(current_chunk))
                                  current_chunk = []
                                  current_size = 0
                              current_chunk.append(part)
                              current_size += len(part)
                          continue
                      current_chunk.append(file_diff)
                      current_size += len(file_diff)
                  if current_chunk:
                      chunks.append(''.join(current_chunk))
                  if not chunks:
                      chunks = ['']

                  for index, chunk in enumerate(chunks, 1):
                      prompt = (
                          header
                          + json.dumps(compact_context, indent=2)
                          + f'\n\nUnified diff chunk {index}/{len(chunks)} follows:\n'
                          + chunk
                      )
                      (chunks_dir / f'prompt-{index:03d}.txt').write_text(prompt)
                  (root / 'chunk-summary.json').write_text(json.dumps({
                      'chunk_count': len(chunks),
                      'max_chunk_chars': max_chars,
                      'prompt_files': [str(p) for p in sorted(chunks_dir.glob('prompt-*.txt'))],
                  }, indent=2) + '\n')
                  print(f"Prepared {len(chunks)} review prompt chunk(s)")
                  PY

            - name: Run agent review
              if: steps.secrets.outputs.skip != 'true'
              id: agent
              continue-on-error: true
              # --- Provider-specific section --------------------------------------
              # This is the only model-aware step. It drives z.ai's GLM-5.2 through the
              # OpenAI-compatible chat endpoint. To swap the review model, change these
              # env vars (and the request body below if the target API shape differs).
              env:
                  ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
                  # z.ai GLM Coding Plan, OpenAI-compatible endpoint. ZAI_API_KEY is the
                  # same Coding Plan key the local omp-glm wrapper uses (omp authenticates
                  # it with its "zai-coding-plan" preset), so this coding endpoint is the
                  # right one. A standard pay-as-you-go key would instead use
                  # https://api.z.ai/api/paas/v4.
                  MODEL_BASE_URL: https://api.z.ai/api/coding/paas/v4
                  MODEL_ID: glm-5.2
                  # "high", not "max": at max effort a large chunk reasons for 12+ minutes,
                  # longer than z.ai holds a non-streaming connection open. PR #735 lost
                  # six straight calls to RemoteDisconnected/IncompleteRead that way, while
                  # PR #732 finished its 747s call barely inside the window.
                  MODEL_REASONING_EFFORT: high
                  # Per-request timeout (seconds). High effort still reasons for a while
                  # on large chunks.
                  MODEL_REQUEST_TIMEOUT: "600"
              shell: bash
              run: |
                  set -euo pipefail
                  # Direct call to the OpenAI-compatible chat endpoint: the prompt already
                  # forbids tools and asks for raw review JSON, so no agentic CLI is needed.
                  # thinking + reasoning_effort go at the top level of the request body.
                  python3 <<'PY'
                  import json
                  import os
                  import pathlib
                  import sys
                  import time
                  import urllib.error
                  import urllib.request

                  root = pathlib.Path('agent-review')
                  api_key = os.environ['ZAI_API_KEY']
                  url = os.environ['MODEL_BASE_URL'].rstrip('/') + '/chat/completions'
                  model = os.environ['MODEL_ID']
                  effort = os.environ['MODEL_REASONING_EFFORT']
                  timeout = float(os.environ.get('MODEL_REQUEST_TIMEOUT', '600'))
                  max_attempts = 3
                  transient_status = {429, 500, 502, 503, 504}

                  def call_model(prompt: str):
                      body = json.dumps({
                          'model': model,
                          'thinking': {'type': 'enabled'},
                          'reasoning_effort': effort,
                          'stream': False,
                          'messages': [{'role': 'user', 'content': prompt}],
                      }).encode()
                      req = urllib.request.Request(url, data=body, method='POST', headers={
                          'Authorization': 'Bearer ' + api_key,
                          'Content-Type': 'application/json',
                          'Accept': 'application/json',
                      })
                      last_err = 'no attempt made'
                      for attempt in range(1, max_attempts + 1):
                          try:
                              with urllib.request.urlopen(req, timeout=timeout) as resp:
                                  payload = json.loads(resp.read().decode('utf-8', 'replace'))
                              choices = payload.get('choices') or []
                              content = (choices[0].get('message', {}).get('content') if choices else '') or ''
                              if not content.strip():
                                  raise ValueError('model returned empty content: ' + json.dumps(payload)[:500])
                              return content, None
                          except urllib.error.HTTPError as exc:
                              try:
                                  detail = exc.read().decode('utf-8', 'replace')
                              except Exception:
                                  detail = ''
                              # Response body only; the auth header is never echoed back.
                              last_err = f'HTTP {exc.code} {exc.reason}\n{detail}'
                              if exc.code not in transient_status:
                                  return None, last_err
                          except Exception as exc:
                              last_err = f'{type(exc).__name__}: {exc}'
                          if attempt < max_attempts:
                              time.sleep(attempt * 5)
                      return None, last_err

                  overall_rc = 0
                  prompt_files = sorted((root / 'chunks').glob('prompt-*.txt'))
                  for index, prompt_file in enumerate(prompt_files, 1):
                      content, err = call_model(prompt_file.read_text())
                      (root / f'agent-{index}.exitcode').write_text('0' if err is None else '1')
                      if err is None:
                          (root / f'review-{index}.raw').write_text(content)
                      else:
                          (root / f'agent-{index}.stderr').write_text(err)
                          overall_rc = 1
                          break

                  (root / 'agent.exitcode').write_text(str(overall_rc))
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                      out.write(f'exit_code={overall_rc}\n')
                  sys.exit(overall_rc)
                  PY

            - name: Normalize review artifact
              if: steps.secrets.outputs.skip != 'true'
              id: normalize
              shell: bash
              run: |
                  set -euo pipefail
                  python3 <<'PY'
                  import json
                  import pathlib
                  import re

                  root = pathlib.Path('agent-review')

                  summary = {
                      'valid_json': False,
                      'valid_targets': False,
                      'event': None,
                      'comment_count': 0,
                      'invalid_comments': [],
                      'agent_exit_code': int((root / 'agent.exitcode').read_text().strip() or '1') if (root / 'agent.exitcode').exists() else 1,
                      'chunk_count': 0,
                  }

                  def load_review(raw_path: pathlib.Path) -> dict:
                      raw_text = raw_path.read_text() if raw_path.exists() else ''

                      def strip_fences(value: str) -> str:
                          value = value.strip()
                          if value.startswith('```'):
                              value = re.sub(r'^```(?:json)?\s*', '', value)
                              value = re.sub(r'\s*```$', '', value).strip()
                          return value

                      def coerce_review(value):
                          if isinstance(value, dict):
                              if {'event', 'body', 'comments'} <= set(value):
                                  return value
                              result = value.get('result')
                              if isinstance(result, str):
                                  found = extract_review(result)
                                  if found is not None:
                                      return found
                              if isinstance(result, dict):
                                  found = coerce_review(result)
                                  if found is not None:
                                      return found
                              message = value.get('message')
                              if isinstance(message, dict):
                                  found = coerce_review(message.get('content'))
                                  if found is not None:
                                      return found
                              content = value.get('content')
                              if isinstance(content, list):
                                  texts = []
                                  for item in content:
                                      if isinstance(item, dict) and item.get('type') == 'text':
                                          texts.append(str(item.get('text') or ''))
                                      elif isinstance(item, str):
                                          texts.append(item)
                                  if texts:
                                      found = extract_review('\n'.join(texts))
                                      if found is not None:
                                          return found
                          if isinstance(value, list):
                              for item in reversed(value):
                                  found = coerce_review(item)
                                  if found is not None:
                                      return found
                          return None

                      def extract_review(value: str):
                          clean = strip_fences(value)
                          if not clean:
                              return None
                          try:
                              found = coerce_review(json.loads(clean))
                              if found is not None:
                                  return found
                          except Exception:
                              pass
                          decoder = json.JSONDecoder()
                          for index, char in enumerate(clean):
                              if char != '{':
                                  continue
                              try:
                                  parsed, _ = decoder.raw_decode(clean[index:])
                              except Exception:
                                  continue
                              found = coerce_review(parsed)
                              if found is not None:
                                  return found
                          return None

                      review = extract_review(raw_text)
                      if not isinstance(review, dict):
                          raise ValueError(f'{raw_path.name}: review must be a JSON object')
                      event = review.get('event')
                      if event == 'REQUEST_CHANGE':
                          event = 'REQUEST_CHANGES'
                          review['event'] = event
                      if event not in {'COMMENT', 'REQUEST_CHANGES'}:
                          raise ValueError(f'{raw_path.name}: event must be COMMENT or REQUEST_CHANGES')
                      if not isinstance(review.get('body'), str) or not review['body'].strip():
                          raise ValueError(f'{raw_path.name}: body must be a non-empty string')
                      if not isinstance(review.get('comments'), list):
                          raise ValueError(f'{raw_path.name}: comments must be an array')
                      for i, comment in enumerate(review['comments']):
                          if not isinstance(comment, dict):
                              raise ValueError(f'{raw_path.name}: comments[{i}] must be an object')
                          if not isinstance(comment.get('path'), str) or not comment['path']:
                              raise ValueError(f'{raw_path.name}: comments[{i}].path must be a non-empty string')
                          if not isinstance(comment.get('line'), int) or comment['line'] < 1:
                              raise ValueError(f'{raw_path.name}: comments[{i}].line must be a positive integer')
                          if not isinstance(comment.get('body'), str) or not comment['body'].strip():
                              raise ValueError(f'{raw_path.name}: comments[{i}].body must be a non-empty string')
                      return review

                  try:
                      raw_paths = sorted(root.glob('review-*.raw'))
                      if not raw_paths and (root / 'review.raw').exists():
                          raw_paths = [root / 'review.raw']
                      if not raw_paths:
                          raise ValueError('no agent review output files found')
                      reviews = [load_review(raw_path) for raw_path in raw_paths]
                      review = {
                          'event': 'REQUEST_CHANGES' if any(r.get('event') == 'REQUEST_CHANGES' for r in reviews) else 'COMMENT',
                          'body': '\n\n'.join(f"Chunk {idx}: {r.get('body', '').strip()}" for idx, r in enumerate(reviews, 1)),
                          'comments': [comment for r in reviews for comment in r.get('comments', [])],
                      }

                      summary['valid_json'] = True
                      summary['event'] = review['event']
                      summary['comment_count'] = len(review['comments'])
                      summary['chunk_count'] = len(raw_paths)

                      added = {}
                      current = None
                      new_line = None
                      for diff_line in (root / 'pr.diff').read_text().splitlines():
                          if diff_line.startswith('+++ b/'):
                              current = diff_line[6:]
                              added.setdefault(current, set())
                              new_line = None
                              continue
                          if diff_line.startswith('@@'):
                              match = re.search(r'\+(\d+)(?:,(\d+))?', diff_line)
                              new_line = int(match.group(1)) if match else None
                              continue
                          if current and new_line is not None:
                              if diff_line.startswith('+') and not diff_line.startswith('+++'):
                                  added[current].add(new_line)
                                  new_line += 1
                              elif diff_line.startswith('-') and not diff_line.startswith('---'):
                                  pass
                              else:
                                  new_line += 1

                      for i, comment in enumerate(review['comments']):
                          if comment['line'] not in added.get(comment['path'], set()):
                              summary['invalid_comments'].append({
                                  'index': i,
                                  'path': comment['path'],
                                  'line': comment['line'],
                              })
                      summary['valid_targets'] = not summary['invalid_comments']
                      (root / 'review.json').write_text(json.dumps(review, indent=2) + '\n')
                  except Exception as exc:
                      summary['error'] = str(exc)

                  (root / 'summary.json').write_text(json.dumps(summary, indent=2) + '\n')
                  print(json.dumps(summary, indent=2))
                  print(f"event={summary['event'] or ''}")
                  print(f"valid_json={str(summary['valid_json']).lower()}")
                  print(f"valid_targets={str(summary['valid_targets']).lower()}")
                  with open(pathlib.Path(__import__('os').environ['GITHUB_OUTPUT']), 'a') as out:
                      print(f"event={summary['event'] or ''}", file=out)
                      print(f"valid_json={str(summary['valid_json']).lower()}", file=out)
                      print(f"valid_targets={str(summary['valid_targets']).lower()}", file=out)
                      print(f"agent_exit_code={summary['agent_exit_code']}", file=out)
                  PY

            - name: Display review result
              if: steps.secrets.outputs.skip != 'true' && always()
              shell: bash
              run: |
                  set -euo pipefail
                  python3 <<'PY'
                  import json
                  import os
                  import pathlib
                  import re

                  root = pathlib.Path('agent-review')
                  summary_path = root / 'summary.json'
                  review_path = root / 'review.json'
                  summary = json.loads(summary_path.read_text()) if summary_path.exists() else {}
                  review = json.loads(review_path.read_text()) if review_path.exists() else None

                  def clipped(text: str, limit: int = 12000) -> str:
                      if len(text) <= limit:
                          return text
                      return text[:limit] + f"\n\n... truncated {len(text) - limit} characters; download agent-review artifact for full output ..."

                  def redacted(text: str) -> str:
                      patterns = [
                          (r'(?i)(authorization:\s*bearer\s+)[^\s]+', r'\1***'),
                          (r'(?i)((?:api[_-]?key|token|password|secret)=)[^\s&]+', r'\1***'),
                          (r'github_pat_[A-Za-z0-9_]+', 'github_pat_***'),
                          (r'gh[opsu]_[A-Za-z0-9_]+', 'gh*_***'),
                          (r'sk-[A-Za-z0-9_-]{12,}', 'sk-***'),
                          (r'(https?://)[^:/\s]+:[^@/\s]+@', r'\1***:***@'),
                      ]
                      for pattern, replacement in patterns:
                          text = re.sub(pattern, replacement, text)
                      return text

                  lines = [
                      '# Agent review result',
                      '',
                      f"- Agent exit code: `{summary.get('agent_exit_code', '')}`",
                      f"- Valid JSON: `{str(summary.get('valid_json', '')).lower()}`",
                      f"- Valid targets: `{str(summary.get('valid_targets', '')).lower()}`",
                      f"- Event: `{summary.get('event') or ''}`",
                      f"- Comment count: `{summary.get('comment_count', 0)}`",
                      f"- Chunk count: `{summary.get('chunk_count', 0)}`",
                  ]
                  if summary.get('error'):
                      lines.extend(['', '## Normalization error', '', '```text', str(summary['error']), '```'])
                  if summary.get('invalid_comments'):
                      lines.extend(['', '## Invalid comment targets', '', '```json', json.dumps(summary['invalid_comments'], indent=2), '```'])
                  stderr_files = sorted(root.glob('agent-*.stderr'))
                  if stderr_files:
                      lines.extend(['', '## Agent stderr', ''])
                      for path in stderr_files:
                          text = path.read_text(errors='replace').strip()
                          if not text:
                              continue
                          lines.extend([f'### {path.name}', '', '```text', clipped(redacted(text)), '```'])
                  if review:
                      lines.extend(['', '## Review body', '', redacted((review.get('body') or '').strip() or '(empty)')])
                      comments = review.get('comments') or []
                      if comments:
                          lines.extend(['', '## Review comments'])
                          for comment in comments:
                              lines.extend([
                                  '',
                                  f"- `{comment.get('path')}:{comment.get('line')}`",
                                  '',
                                  redacted((comment.get('body') or '').strip()),
                              ])
                  else:
                      raw_files = sorted(root.glob('review-*.raw'))
                      if raw_files:
                          lines.extend(['', '## Raw agent output'])
                          for path in raw_files:
                              text = path.read_text(errors='replace').strip()
                              if not text:
                                  continue
                              lines.extend([f'### {path.name}', '', '```text', clipped(redacted(text)), '```'])
                  rendered = '\n'.join(lines) + '\n'
                  print(rendered)
                  summary_file = pathlib.Path(os.environ['GITHUB_STEP_SUMMARY'])
                  with summary_file.open('a') as out:
                      out.write(rendered)
                  PY

            - name: Upload review artifact
              if: steps.secrets.outputs.skip != 'true' && always()
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: agent-review-pr-${{ github.event.pull_request.number }}
                  path: agent-review/
                  if-no-files-found: error
                  retention-days: 14

            - name: Gate on review result
              if: steps.secrets.outputs.skip != 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  agent_exit='${{ steps.normalize.outputs.agent_exit_code }}'
                  valid_json='${{ steps.normalize.outputs.valid_json }}'
                  valid_targets='${{ steps.normalize.outputs.valid_targets }}'
                  event='${{ steps.normalize.outputs.event }}'

                  if [[ "${agent_exit}" != "0" ]]; then
                    echo "::error title=Agent review failed::Model API call failed with ${agent_exit}. See the Display review result step above."
                    exit 1
                  fi
                  if [[ "${valid_json}" != "true" ]]; then
                    echo "::error title=Agent review invalid::Model did not return valid review JSON. See the Display review result step above."
                    exit 1
                  fi
                  if [[ "${valid_targets}" != "true" ]]; then
                    echo "::error title=Agent review invalid targets::One or more comments do not target added PR lines. See the Display review result step above."
                    exit 1
                  fi
                  if [[ "${event}" == "REQUEST_CHANGES" ]]; then
                    echo "::error title=Agent requested changes::The review agent returned REQUEST_CHANGES. See the Display review result step above."
                    exit 1
                  fi
                  echo "Agent review returned ${event}; no blocking review requested."
