name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1: fast feedback (<2 min target). Fails surface quickly so devs
  # don't wait on the full suite to learn about a typo or lint break.
  go-fast:
    name: Go (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Install Go format tools
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: make fmt-check
        working-directory: go
        run: make fmt-check

      - name: make lint-fast
        working-directory: go
        run: make lint-fast

      - name: go test (no race)
        working-directory: go
        run: go test ./...

  python-fast:
    name: Python (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dev deps
        working-directory: python
        run: pip install -e ".[dev]"

      - name: ruff check
        working-directory: python
        run: ruff check src/ tests/

      - name: ruff format check
        working-directory: python
        run: ruff format --check src/ tests/

      - name: mypy
        working-directory: python
        run: mypy --ignore-missing-imports src/ tests/

      - name: pytest unit (no coverage)
        working-directory: python
        run: pytest tests/unit/ --no-cov -q

  # Phase 2: full validation. Runs in parallel with fast jobs so devs see
  # the fast signal first; the merge gate still requires every job green.
  go-full:
    name: Go (full + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: make test-race
        working-directory: go
        run: make test-race

      - name: go test with coverage
        working-directory: go
        run: go test -coverprofile=coverage.out ./...

      - name: make build (dev)
        working-directory: go
        run: make build

      - name: make build-prod (PIE/trimpath/stripped/static)
        working-directory: go
        run: make build-prod

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: go/coverage.out
          retention-days: 7

  python-full:
    name: Python (full + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install dev deps
        working-directory: python
        run: pip install -e ".[dev]"

      # pyproject.toml addopts already include --cov=linodemcp and
      # --cov-fail-under=54, so this run enforces the threshold.
      - name: pytest (full suite + coverage gate)
        working-directory: python
        run: pytest tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python/htmlcov/
          retention-days: 7

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      # Scanners track latest so each rebuild picks up fresh CVE/secret
      # detection rules without a manual version bump.
      - name: Install Go security tools (latest)
        run: |
          set -euo pipefail
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install github.com/chadit/cairnlint@latest
          go install github.com/betterleaks/betterleaks@latest

      - name: gosec
        working-directory: go
        run: gosec -quiet ./...

      - name: cairnlint
        working-directory: go
        run: cairnlint ./...

      - name: betterleaks
        run: betterleaks dir .

      - name: trivy fs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,misconfig
          exit-code: "1"
          ignore-unfixed: false
          severity: HIGH,CRITICAL
