name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# One job, one command: `make check`. That target is the single definition of
# done, the same command developers run locally and the pre-push hook runs,
# so CI cannot drift from the local gate by construction. Every quality check
# (formatting, both languages' full lint incl. gosec/cairnlint/pyright, all
# tests, the cross-language gates, betterleaks, trivy, actionlint, and both
# builds incl. the hardened Go build) lives inside that target. The steps
# before it only provision the environment; none of them run checks. The one
# step after it re-runs `make diff-coverage` with the event's true base:
# inside `check` the gate diffs against origin/main, which is right locally
# and on PRs but is HEAD itself on a push to main, so the re-run with the
# push predecessor is what keeps direct pushes honest. It is still a make
# target, so nothing here hand-copies a command.
#
# History: the previous 6-job layout hand-copied commands (mypy flags, gosec
# flags, ruff scope, betterleaks flags, venv extras) and every CI failure for
# a month was one of those copies drifting from the make targets. Environment
# provisioning is the only thing left that can drift; keep it dumb.
jobs:
  make-check:
    name: make check (all gates)
    runs-on: ubuntu-latest
    steps:
      # Full history so diff-coverage's base rev (PR merge parent / push
      # predecessor) is reachable for `git diff`.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      # Single-sourced provisioning: the identical script the CI-mirror
      # container image runs (ci/Dockerfile), so this job and a local
      # `make check-container` cannot drift. It installs the gate toolchain:
      # gofumpt/goimports/golangci-lint (latest), buf (pinned for codegen
      # reproducibility), uv, betterleaks (release binary), trivy (latest).
      # gosec, cairnlint, actionlint, and pyright need no install: the make
      # targets self-provision them via `go run @latest` / `npx pyright@latest`
      # (node ships on the runner image). GH_TOKEN raises the GitHub API rate
      # limit for the betterleaks release download.
      - name: Install gate toolchain
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci-setup.sh

      - name: make check
        run: make check

      # Re-run of the in-check diff-coverage gate with the event's true
      # base (same resolution as baseline-guard: a PR checkout is the merge
      # commit whose first parent is the base branch tip; a push carries
      # the previous tip). On PRs this matches the in-check origin/main run;
      # on pushes to main it is the run that actually diffs something. An
      # all-zero before (branch creation) is skipped by the script itself.
      - name: Resolve diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "rev=HEAD^1" >> "$GITHUB_OUTPUT"
          else
            echo "rev=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: make diff-coverage (added lines need tests)
        run: make diff-coverage BASE="${{ steps.base.outputs.rev }}"

      # pytest inside make check writes the HTML coverage report; publish it
      # for inspection. Not a gate; the coverage threshold already failed
      # the build inside make check if unmet.
      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-coverage
          path: python/htmlcov/
          retention-days: 7
          if-no-files-found: ignore
