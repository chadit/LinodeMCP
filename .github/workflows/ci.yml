name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# One job, one command: `make check`. That target is the single definition of
# done, the same command developers run locally and the pre-push hook runs,
# so CI cannot drift from the local gate by construction. Every quality check
# (formatting, both languages' full lint incl. gosec/cairnlint/pyright, all
# tests, the cross-language gates, betterleaks, trivy, actionlint, and both
# builds incl. the hardened Go build) lives inside that target. The steps
# before it only provision the environment; none of them run checks.
#
# History: the previous 6-job layout hand-copied commands (mypy flags, gosec
# flags, ruff scope, betterleaks flags, venv extras) and every CI failure for
# a month was one of those copies drifting from the make targets. Environment
# provisioning is the only thing left that can drift; keep it dumb.
jobs:
  make-check:
    name: make check (all gates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go/go.mod
          cache: true
          cache-dependency-path: go/go.sum

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      # gofumpt/goimports back `make fmt-check`; golangci-lint backs the Go
      # lint target. All @latest so local machines (which also track latest)
      # and CI run the same versions. gosec, cairnlint, actionlint, and
      # pyright need no install step: the make targets self-provision them
      # via `go run @latest` / `npx --yes pyright@latest` (node ships on the
      # runner image).
      - name: Install Go format/lint tools
        run: |
          set -euo pipefail
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      # buf is pinned (not @latest) on purpose: generated code must be
      # byte-reproducible against the committed baselines, and local dev
      # machines pin the same version. Bump both together.
      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@v1.71.0

      # uv backs the lock-check target (hard requirement, no skip).
      - name: Install uv
        run: pip install uv

      # betterleaks ships a `replace` directive in its go.mod (forks
      # wasilibs/go-re2 for a smaller WASM blob), which makes
      # `go install pkg@latest` refuse the build. Fetch the release
      # binary instead. The make target passes --regex-engine=stdlib, so
      # the WASM engine the replace optimizes is never loaded; see
      # https://github.com/betterleaks/betterleaks/issues/74.
      - name: Install betterleaks (latest release binary)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag=$(gh release view --repo betterleaks/betterleaks --json tagName -q .tagName)
          version="${tag#v}"
          asset="betterleaks_${version}_linux_x64.tar.gz"
          tmpdir=$(mktemp -d)
          gh release download "$tag" \
            --repo betterleaks/betterleaks \
            --pattern "$asset" \
            --dir "$tmpdir"
          tar -xzf "$tmpdir/$asset" -C "$tmpdir" betterleaks
          sudo install -m 0755 "$tmpdir/betterleaks" /usr/local/bin/betterleaks
          rm -rf "$tmpdir"
          betterleaks version

      # Latest trivy via the official install script, so CI runs the same
      # `trivy fs` CLI command the make target defines (the previous
      # trivy-action invocation was a second, differently-configured scan).
      - name: Install trivy (latest)
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: make check
        run: make check

      # pytest inside make check writes the HTML coverage report; publish it
      # for inspection. Not a gate; the coverage threshold already failed
      # the build inside make check if unmet.
      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-coverage
          path: python/htmlcov/
          retention-days: 7
          if-no-files-found: ignore
