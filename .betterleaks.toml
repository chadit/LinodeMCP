# betterleaks (gitleaks-compatible) secret-scanner config.
# Auto-discovered by `betterleaks dir .` (root Makefile `betterleaks` target,
# the pre-push make-lint hook, and the CI security job).
#
# useDefault keeps the full default gitleaks ruleset for the whole repo, so a
# real secret committed anywhere still fails the scan. The allowlists below
# exempt two things a real-secret scan should never flag:
#
#  1. The proto conformance AND behavior replay fixtures. Both INTENTIONALLY
#     carry synthetic placeholder secret values (access keys, tokens, TFA
#     secrets, install api_keys) because the tools they cover return secret
#     material by design and the fixtures must prove Go and Python serialize it
#     identically. Keep everything under testdata/conformance/ and
#     testdata/behavior/ synthetic: a real secret dropped there would be masked.
#     This mirrors the existing `// betterleaks:allow test fixture` inline
#     exemptions used for Go/Python test source (JSON has no comment syntax,
#     hence a path allowlist).
#
#  2. Build output under any bin/ (wheels, sdists, compiled binaries). It is
#     generated from source that is already scanned in place, so scanning the
#     bundled copies only produces duplicate findings.
[extend]
useDefault = true

[[allowlists]]
description = "Proto conformance + behavior replay fixtures carry synthetic placeholder secrets by design"
paths = [
    '''testdata/conformance/.*\.json$''',
    '''testdata/behavior/.*\.json$''',
]

[[allowlists]]
description = "Build output is generated from already-scanned source; do not rescan bundled copies"
paths = ['''(^|/)bin/''']
