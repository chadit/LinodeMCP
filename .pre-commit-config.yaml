# Run `pre-commit autoupdate` to bump all revs to latest.
repos:
  # Go linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        args: ['--max-issues-per-linter=0', '--max-same-issues=0']
        # golangci-lint picks up ~/.golangci.yml automatically. The hook runs
        # from the repo root by default, but go.mod lives in go/, so tell it
        # where to run so GCI's localModule check finds the module file.
        entry: bash -c 'cd go && golangci-lint run "$@"' --

  # Python linter + formatter (managed - auto-installed by pre-commit)
  # Use language: system to use the project's venv-installed ruff.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd python && .venv/bin/ruff check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd python && .venv/bin/ruff format --check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false

  # Markdown linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      # GitHub Actions workflow linter. language: golang + @latest mirrors
      # gofumpt/goimports below and the CI scanners (gosec, cairnlint),
      # which all track latest so new checks land without a manual bump
      # (Renovate does not monitor this pin). pass_filenames: false so a
      # change to any workflow re-lints the whole set, since the release
      # workflows call each other.
      - id: actionlint
        name: actionlint
        entry: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
        types: [yaml]
        language: golang
        pass_filenames: false
        additional_dependencies: ['github.com/rhysd/actionlint/cmd/actionlint@latest']

      # Go formatting (managed via language: golang)
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['mvdan.cc/gofumpt@latest']

      - id: goimports
        name: goimports
        entry: goimports -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['golang.org/x/tools/cmd/goimports@latest']

      # Go tests - language: system because they need project Go modules
      - id: go-test
        name: go test
        entry: bash -c 'cd go && go test -race ./...'
        files: ^go/
        types: [go]
        language: system
        pass_filenames: false

      # mypy - language: system because it needs project venv dependencies
      - id: mypy
        name: mypy
        entry: bash -c 'cd python && .venv/bin/mypy src/linodemcp'
        files: ^python/.*\.py$
        types: [python]
        language: system
        pass_filenames: false

      # pytest - language: system because it needs project venv dependencies
      - id: pytest
        name: pytest
        entry: bash -c 'cd python && .venv/bin/pytest -q'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Final lint gate before push. Runs the root `make lint`, which is
      # the same set CI runs: go-lint (golangci + gosec + cairnlint),
      # python-lint (ruff + format + mypy + pyright), betterleaks, trivy,
      # and actionlint. This mirrors the CI security job too, so a trivy
      # CVE or a betterleaks finding fails here before the push instead of
      # surfacing only in CI. trivy and betterleaks self-skip with a
      # warning when not installed locally, so this stays usable without
      # them, but install both to get the full pre-push gate. Run:
      #   pre-commit install --hook-type pre-push
      # so this hook actually fires on `git push`.
      - id: make-lint
        name: make lint (full, both languages plus security scans)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # uv.lock must stay in sync with pyproject.toml. A drift here is how
      # the lock kept shipping stale (CVE-flagged) versions while pyproject
      # looked fine, and how a new dep (textual) never got locked. Skips
      # with a warning when uv isn't installed so the hook stays usable.
      - id: uv-lock-check
        name: uv.lock in sync with pyproject
        entry: bash -c 'if command -v uv >/dev/null 2>&1; then cd python && uv lock --check; else echo "[warn] uv not installed, skipping lock-sync check"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Build gate before push. Ensures both Go and Python artifacts build
      # cleanly from the root Makefile. Requires:
      #   pre-commit install --hook-type pre-push
      - id: make-build
        name: make build (root, all languages)
        entry: make build
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
