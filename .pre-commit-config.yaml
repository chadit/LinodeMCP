# Run `pre-commit autoupdate` to bump all revs to latest.
repos:
  # Go linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        args: ['--max-issues-per-linter=0', '--max-same-issues=0']
        # golangci-lint picks up ~/.golangci.yml automatically. The hook runs
        # from the repo root by default, but go.mod lives in go/, so tell it
        # where to run so GCI's localModule check finds the module file.
        entry: bash -c 'cd go && golangci-lint run "$@"' --

  # Python linter + formatter (managed - auto-installed by pre-commit)
  # Use language: system to use the project's venv-installed ruff.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd python && .venv/bin/ruff check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd python && .venv/bin/ruff format --check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false

      # The repo gate/verify scripts (scripts/) live outside python/, so the
      # two hooks above skip them. These run the same venv ruff from the repo
      # root over scripts/, where ruff auto-discovers scripts/ruff.toml (which
      # extends python/pyproject.toml and ignores only the CLI-legit rules).
      - id: ruff-scripts
        name: ruff (scripts)
        entry: bash -c 'python/.venv/bin/ruff check scripts/'
        files: ^scripts/.*\.py$
        types: [python]
        language: system
        pass_filenames: false
      - id: ruff-format-scripts
        name: ruff format (scripts)
        entry: bash -c 'python/.venv/bin/ruff format --check scripts/'
        files: ^scripts/.*\.py$
        types: [python]
        language: system
        pass_filenames: false

  # Markdown linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      # GitHub Actions workflow linter. language: golang + @latest mirrors
      # gofumpt/goimports below and the CI scanners (gosec, cairnlint),
      # which all track latest so new checks land without a manual bump
      # (Renovate does not monitor this pin). pass_filenames: false so a
      # change to any workflow re-lints the whole set, since the release
      # workflows call each other.
      - id: actionlint
        name: actionlint
        entry: actionlint
        files: ^\.github/workflows/.*\.ya?ml$
        types: [yaml]
        language: golang
        pass_filenames: false
        additional_dependencies: ['github.com/rhysd/actionlint/cmd/actionlint@latest']

      # Go formatting (managed via language: golang)
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['mvdan.cc/gofumpt@latest']

      - id: goimports
        name: goimports
        entry: goimports -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['golang.org/x/tools/cmd/goimports@latest']

      # Go tests - language: system because they need project Go modules
      - id: go-test
        name: go test
        entry: bash -c 'cd go && go test -race ./...'
        files: ^go/
        types: [go]
        language: system
        pass_filenames: false

      # Cross-language tool-surface parity. Runs the Go dumper + Python registry
      # and diffs capability/params/required against docs/contracts/tool-parity-baseline.txt.
      # language: system because it needs both the Go toolchain and the Python
      # venv. Fires when either implementation's source changes so a tool cannot
      # drift in shape between Go and Python.
      - id: tool-parity
        name: tool parity (Go vs Python surface)
        entry: bash -c 'python/.venv/bin/python scripts/verify_tool_parity.py'
        files: ^(go|python)/
        language: system
        pass_filenames: false

      # Handler-level write-proto completeness. Statically classifies every
      # mutating tool's success path (Go: go run ./cmd/write-proto-dump; Python:
      # the _write_proto_classifier module) and ratchets the straggler + missing
      # fixture sets down against docs/contracts/write-proto-baseline.txt and
      # docs/contracts/write-proto-fixture-baseline.txt. language: system because it needs
      # both the Go toolchain and the Python venv. Fires when either
      # implementation's source or the protos change so a handler cannot stay or
      # go legacy without the baseline moving.
      - id: write-proto
        name: write-proto (handler proto-routing completeness)
        entry: bash -c 'python/.venv/bin/python scripts/verify_write_proto.py'
        files: ^(go|python|proto)/
        language: system
        pass_filenames: false

      # Read-surface sibling of write-proto: classifies every Read tool's
      # handler on both sides and ratchets the straggler set against
      # docs/contracts/read-proto-baseline.txt (that baseline is the authoritative
      # remaining-work list for the read-surface proto conversion).
      - id: read-proto
        name: read-proto (read handler proto-routing completeness)
        entry: bash -c 'python/.venv/bin/python scripts/verify_read_proto.py'
        files: ^(go|python|proto)/
        language: system
        pass_filenames: false

      # Input-schema sibling of write-proto/read-proto: classifies every tool's
      # factory on both sides (Go: go run ./cmd/write-proto-dump -surface input;
      # Python: the _write_proto_classifier module in input mode) as
      # proto-generated or hand-built and ratchets the straggler set against
      # docs/contracts/input-proto-baseline.txt (the authoritative remaining-work list for
      # the input-surface proto conversion).
      - id: input-proto
        name: input-proto (tool input-schema proto completeness)
        entry: bash -c 'python/.venv/bin/python scripts/verify_input_proto.py'
        files: ^(go|python|proto)/
        language: system
        pass_filenames: false

      # Meta-capability sibling of write-proto/read-proto: classifies every
      # Meta tool's handler on both sides and ratchets the straggler set
      # against docs/contracts/meta-proto-baseline.txt.
      - id: meta-proto
        name: meta-proto (meta handler proto-routing completeness)
        entry: bash -c 'python/.venv/bin/python scripts/verify_meta_proto.py'
        files: ^(go|python|proto)/
        language: system
        pass_filenames: false

      # Handler-semantics gate: ratchets behavior-fixture coverage against
      # docs/contracts/behavior-baseline.txt (the Go/Python test runners enforce the
      # fixtures themselves; this keeps coverage from regressing).
      - id: behavior
        name: behavior (cross-language handler fixture coverage)
        entry: bash -c 'python/.venv/bin/python scripts/verify_behavior.py'
        files: ^(go|python|proto|testdata/behavior)/
        language: system
        pass_filenames: false

      # Confirm-message text parity: diffs every extractable confirm-gate
      # message across both languages so text drift on branches no fixture
      # exercises still fails (ratchets docs/contracts/message-parity-baseline.txt).
      - id: messages
        name: messages (cross-language confirm-text parity)
        entry: bash -c 'python/.venv/bin/python scripts/verify_messages.py'
        files: ^(go|python)/
        language: system
        pass_filenames: false

      # The stdlib-only offline gates (no venv needed). Same commit-stage
      # placement as the gates above: `make check` at push runs them all
      # anyway, but failing at commit time keeps the fix in the same change.
      - id: tool-count
        name: tool-count (README count vs tools-manifest)
        entry: bash -c 'python3 scripts/verify_docs_tool_count.py'
        files: ^(README\.md|docs/contracts/tools-manifest\.txt)$
        language: system
        pass_filenames: false

      - id: dryrun
        name: dryrun (dry_run advertised per capability tier)
        entry: bash -c 'python3 scripts/verify_dryrun.py'
        files: ^(go|python|proto)/|^docs/contracts/tools-capabilities\.txt$
        language: system
        pass_filenames: false

      - id: pagination
        name: pagination (list tools paginate per the spec snapshot)
        entry: bash -c 'python3 scripts/verify_pagination.py'
        files: ^(go|python|proto|testdata/behavior)/|^docs/contracts/(pagination-baseline|api-pagination-baseline)\.txt$
        language: system
        pass_filenames: false

      - id: env-parity
        name: env-parity (env-read surface matches the contract)
        entry: bash -c 'python3 scripts/verify_env_parity.py'
        files: ^(go|python)/|^docs/contracts/env-vars\.txt$
        language: system
        pass_filenames: false

      - id: cli-surface
        name: cli-surface (CLI verbs and flags match across languages)
        entry: bash -c 'python3 scripts/verify_cli_surface.py'
        files: ^go/(cmd/linodemcp|internal/cli)/|^python/src/linodemcp/(main\.py$|cli/)
        language: system
        pass_filenames: false

      - id: docs-links
        name: docs-links (internal doc links resolve)
        entry: bash -c 'python3 scripts/verify_docs_links.py'
        files: ^(README\.md$|docs/)
        language: system
        pass_filenames: false

      # mypy - language: system because it needs project venv dependencies
      - id: mypy
        name: mypy
        entry: bash -c 'cd python && .venv/bin/mypy src/linodemcp'
        files: ^python/.*\.py$
        types: [python]
        language: system
        pass_filenames: false

      # THE pre-push gate: `make check` is the total superset (fmt, both
      # languages' full lint incl. gosec/cairnlint/pyright, all tests, every
      # cross-language gate, lock-check, betterleaks, trivy, actionlint,
      # and both builds incl. the hardened Go build). CI's single job runs
      # exactly this same target, so hook green == CI green by construction.
      # The old separate make-lint / uv-lock-check / make-build push hooks
      # are gone: check subsumes them, and running them separately just
      # duplicated multi-minute scans on every push. Requires:
      #   pre-commit install --hook-type pre-push
      - id: make-check
        name: "make check: lint, tests, gates, scans, builds"
        entry: make check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
