# Run `pre-commit autoupdate` to bump all revs to latest.
repos:
  # Go linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        args: ['--max-issues-per-linter=0', '--max-same-issues=0']
        # golangci-lint picks up ~/.golangci.yml automatically. The hook runs
        # from the repo root by default, but go.mod lives in go/ — tell it
        # where to run so GCI's localModule check finds the module file.
        entry: bash -c 'cd go && golangci-lint run "$@"' --

  # Python linter + formatter (managed - auto-installed by pre-commit)
  # Use language: system to use the project's venv-installed ruff.
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -c 'cd python && .venv/bin/ruff check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd python && .venv/bin/ruff format --check'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false

  # Markdown linter (managed - auto-installed by pre-commit)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.21.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      # Go formatting (managed via language: golang)
      - id: gofumpt
        name: gofumpt
        entry: gofumpt -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['mvdan.cc/gofumpt@latest']

      - id: goimports
        name: goimports
        entry: goimports -w
        files: ^go/.*\.go$
        types: [go]
        language: golang
        additional_dependencies: ['golang.org/x/tools/cmd/goimports@latest']

      # Go tests - language: system because they need project Go modules
      - id: go-test
        name: go test
        entry: bash -c 'cd go && go test -race ./...'
        files: ^go/
        types: [go]
        language: system
        pass_filenames: false

      # mypy - language: system because it needs project venv dependencies
      - id: mypy
        name: mypy
        entry: bash -c 'cd python && .venv/bin/mypy src/linodemcp'
        files: ^python/.*\.py$
        types: [python]
        language: system
        pass_filenames: false

      # pytest - language: system because it needs project venv dependencies
      - id: pytest
        name: pytest
        entry: bash -c 'cd python && .venv/bin/pytest -q'
        files: ^python/
        types: [python]
        language: system
        pass_filenames: false
        stages: [pre-push]
