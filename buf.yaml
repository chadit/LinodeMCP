version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  # Enum values are named as the exact lowercase Linode API wire strings on
  # purpose: protojson serializes an enum by its value NAME, so the name IS the
  # API string (no map/transform). That is the core of the enum-to-proto design,
  # so the STANDARD enum-value naming rules are excepted rather than obeyed.
  except:
    - ENUM_VALUE_PREFIX
    - ENUM_VALUE_UPPER_SNAKE_CASE
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - FILE
